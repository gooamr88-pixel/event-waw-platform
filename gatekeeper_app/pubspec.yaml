name: gatekeeper_app
description: "Eventsli Gatekeeper — Ticket Scanner & Gate Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management ──
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── Supabase ──
  supabase_flutter: ^2.8.0

  # ── Navigation ──
  go_router: ^14.6.0

  # ── QR Scanner ──
  mobile_scanner: ^5.2.3

  # ── Local Storage ──
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0

  # ── Secure Storage (tokens, secrets) ──
  flutter_secure_storage: ^9.2.2

  # ── Dependency Injection ──
  get_it: ^8.0.2

  # ── Connectivity ──
  connectivity_plus: ^6.1.0

  # ── Audio (scan feedback) ──
  just_audio: ^0.9.41

  # ── Utilities ──
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_ce_generator: ^1.6.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
