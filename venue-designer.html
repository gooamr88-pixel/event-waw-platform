<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue Designer — Event Waw</title>
  <meta name="description" content="Design your venue seating chart for your Event Waw event." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <script src="js/csp.js"></script>
</head>
<body>

  <!-- ══════ NAVBAR ══════ -->
  <nav class="navbar" id="main-nav">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon"><svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="85" r="52" stroke="currentColor" stroke-width="10"/><path d="M68 75 L80 105 L100 80 L120 105 L132 75" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><line x1="62" y1="125" x2="38" y2="155" stroke="currentColor" stroke-width="10" stroke-linecap="round"/><circle cx="135" cy="52" r="5" fill="currentColor"/></svg></div>
        <span class="nav-logo-text shimmer">Event Waw</span>
      </a>
      <div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="events.html">Events</a></div>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        <a href="login.html" class="btn btn-outline btn-sm" id="nav-signin">Sign In</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
      </div>
    </div>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <button class="close-btn" id="mobile-close">✕</button>
    <a href="dashboard.html">Dashboard</a>
    <a href="events.html">Events</a>
  </div>

  <!-- ══════ MAIN CONTENT ══════ -->
  <div style="padding-top:120px;padding-bottom:80px;">
    <div class="container" style="max-width:1100px;">

      <!-- Header -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <a href="dashboard.html" class="btn btn-outline btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
          Dashboard
        </a>
      </div>
      <h1 style="font-family:var(--font-serif);font-size:clamp(1.6rem,4vw,2.2rem);font-weight:700;margin-bottom:4px;">
        🗺️ Venue <span style="color:var(--accent-primary);">Designer</span>
      </h1>
      <p id="event-name-subtitle" style="color:var(--text-muted);font-size:0.9rem;margin-bottom:32px;">Loading event…</p>

      <!-- Designer Grid -->
      <div class="designer-grid">

        <!-- LEFT: Configuration -->
        <div class="designer-config">

          <!-- Stage -->
          <div class="designer-panel">
            <div class="designer-panel-title">
              <span>🎤</span> Stage Setup
            </div>
            <div class="designer-field">
              <label class="fl">Stage Label</label>
              <input type="text" class="fi" id="stage-label" value="STAGE" placeholder="e.g. MAIN STAGE" />
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <div class="designer-field">
                <label class="fl">Width</label>
                <input type="number" class="fi" id="stage-width" value="500" min="100" max="1000" />
              </div>
              <div class="designer-field">
                <label class="fl">Height</label>
                <input type="number" class="fi" id="stage-height" value="70" min="30" max="200" />
              </div>
            </div>
          </div>

          <!-- Sections -->
          <div class="designer-panel">
            <div class="designer-panel-title" style="display:flex;justify-content:space-between;align-items:center;">
              <span>💺 Sections</span>
              <button class="btn btn-outline btn-sm" id="add-section-btn">+ Add Section</button>
            </div>
            <div id="sections-list">
              <!-- Dynamic sections added here -->
            </div>
          </div>

          <!-- Actions -->
          <div style="display:flex;gap:10px;margin-top:10px;">
            <button class="btn btn-outline btn-full" id="preview-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Preview
            </button>
            <button class="btn btn-primary btn-full btn-pulse" id="save-btn" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Save & Deploy
            </button>
          </div>

          <!-- Delete -->
          <button class="btn btn-outline btn-full" id="delete-btn" style="margin-top:10px;color:#ef4444;border-color:rgba(239,68,68,.2);display:none;">
            🗑️ Delete Venue Map
          </button>

          <!-- Status -->
          <div id="save-status" style="display:none;margin-top:14px;padding:14px;border-radius:12px;font-size:0.85rem;text-align:center;"></div>
        </div>

        <!-- RIGHT: Live Preview -->
        <div class="designer-preview">
          <div class="designer-panel">
            <div class="designer-panel-title">
              <span>👁️</span> Live Preview
            </div>
            <div id="preview-container" class="designer-preview-canvas">
              <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:10px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                <span style="font-size:0.85rem;">Add sections and click Preview</span>
              </div>
            </div>
            <div id="preview-stats" style="display:none;margin-top:12px;display:flex;flex-wrap:wrap;gap:10px;"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <style>
    .designer-grid {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .designer-grid { grid-template-columns: 1fr; }
    }
    .designer-config { display: flex; flex-direction: column; gap: 16px; }

    .designer-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
    }
    .designer-panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }
    .designer-field { margin-bottom: 12px; }
    .designer-field:last-child { margin-bottom: 0; }

    /* Section cards */
    .section-card {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .section-card:hover { border-color: rgba(212,175,55,.15); }
    .section-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-card-header h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent-primary);
    }
    .section-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .section-remove:hover { color: #ef4444; background: rgba(239,68,68,.08); }

    /* Preview canvas */
    .designer-preview-canvas {
      width: 100%;
      min-height: 400px;
      border-radius: 12px;
      background: rgba(0,0,0,.15);
      border: 1px solid var(--border-color);
      overflow: hidden;
      position: relative;
    }
    .designer-preview-svg {
      width: 100%;
      height: 100%;
    }

    /* Stats pills */
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border-color);
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .stat-pill strong {
      color: var(--accent-primary);
      font-weight: 700;
    }
  </style>

  <script type="module">
    import { supabase, getCurrentUser } from './src/lib/supabase.js';
    import { getEvent } from './src/lib/events.js';
    import { protectPage, updateNavForAuth } from './src/lib/guard.js';
    import { initUI } from './src/lib/ui.js';
    import { generateLayout, saveVenueMap, loadVenueMap, deleteVenueMap, renderPreviewSVG } from './src/lib/venue-designer.js';
    import { escapeHTML } from './src/lib/utils.js';

    let eventData = null;
    let eventId = null;
    let tiers = [];
    let sections = [];
    let sectionIdCounter = 0;
    let currentLayout = null;

    document.addEventListener('DOMContentLoaded', async () => {
      initUI();
      const authState = await protectPage('organizer');
      updateNavForAuth(authState);

      const params = new URLSearchParams(window.location.search);
      eventId = params.get('event_id');

      if (!eventId) {
        alert('Missing event_id parameter');
        window.location.href = 'dashboard.html';
        return;
      }

      // Load event + tiers
      try {
        eventData = await getEvent(eventId);
        document.getElementById('event-name-subtitle').textContent = `Designing layout for: ${eventData.title}`;
        tiers = eventData.ticket_tiers || [];
      } catch (err) {
        alert('Failed to load event: ' + err.message);
        return;
      }

      // Check for existing map
      try {
        const existing = await loadVenueMap(eventId);
        if (existing) {
          loadExistingLayout(existing.layout_json);
          document.getElementById('delete-btn').style.display = 'block';
          showStatus('✏️ Editing existing venue map (v' + (existing.version || 1) + ')', 'info');
        } else {
          // Add a default section
          addSection({ label: 'Section A', rows: 5, seatsPerRow: 12, curveRadius: 300 });
        }
      } catch (err) {
        console.warn('Could not load existing map:', err);
        addSection({ label: 'Section A', rows: 5, seatsPerRow: 12, curveRadius: 300 });
      }

      // Wire up buttons
      document.getElementById('add-section-btn').addEventListener('click', () => {
        const letter = String.fromCharCode(65 + sections.length);
        addSection({ label: `Section ${letter}`, rows: 4, seatsPerRow: 10, curveRadius: 0 });
      });

      document.getElementById('preview-btn').addEventListener('click', () => {
        generatePreview();
      });

      document.getElementById('save-btn').addEventListener('click', async () => {
        await saveDesign();
      });

      document.getElementById('delete-btn').addEventListener('click', async () => {
        if (!confirm('Delete the venue map and all seats? This cannot be undone.')) return;
        try {
          await deleteVenueMap(eventId);
          showStatus('✅ Venue map deleted. Reverting to general admission.', 'success');
          document.getElementById('delete-btn').style.display = 'none';
          sections = [];
          renderSectionsList();
          document.getElementById('preview-container').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">Map deleted</div>';
        } catch (err) {
          showStatus('❌ ' + err.message, 'error');
        }
      });

      // Auto-preview on first load
      generatePreview();
    });

    /**
     * Load an existing layout_json into the section editor.
     */
    function loadExistingLayout(layoutJson) {
      sections = [];
      sectionIdCounter = 0;

      // Restore stage
      if (layoutJson.stage) {
        document.getElementById('stage-label').value = layoutJson.stage.label || 'STAGE';
        document.getElementById('stage-width').value = layoutJson.stage.width || 500;
        document.getElementById('stage-height').value = layoutJson.stage.height || 70;
      }

      // Restore sections
      for (const sec of (layoutJson.sections || [])) {
        const rowCount = sec.rows?.length || 1;
        const seatsPerRow = sec.rows?.[0]?.seats?.length || 10;
        addSection({
          label: sec.label || sec.key,
          rows: rowCount,
          seatsPerRow,
          curveRadius: 0,
          tier_id: sec.tier_id || null,
        });
      }
    }

    /**
     * Add a new section to the list.
     */
    function addSection(opts = {}) {
      const id = `sec-${sectionIdCounter++}`;
      sections.push({
        id,
        key: opts.label?.toLowerCase().replace(/\s+/g, '-') || id,
        label: opts.label || 'New Section',
        rows: opts.rows || 4,
        seatsPerRow: opts.seatsPerRow || 10,
        curveRadius: opts.curveRadius || 0,
        tier_id: opts.tier_id || (tiers.length > 0 ? tiers[0].id : null),
      });
      renderSectionsList();
    }

    /**
     * Render the sections list in the config panel.
     */
    function renderSectionsList() {
      const container = document.getElementById('sections-list');

      if (sections.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:20px 0;">No sections yet. Click "Add Section" to start.</p>';
        return;
      }

      container.innerHTML = sections.map((sec, i) => `
        <div class="section-card" data-id="${sec.id}">
          <div class="section-card-header">
            <h4>Section ${i + 1}</h4>
            <button class="section-remove" onclick="removeSection('${sec.id}')" title="Remove section">✕</button>
          </div>

          <div class="designer-field">
            <label class="fl">Section Name</label>
            <input type="text" class="fi" value="${escapeHTML(sec.label)}"
              onchange="updateSection('${sec.id}', 'label', this.value)" />
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
            <div class="designer-field">
              <label class="fl">Rows</label>
              <input type="number" class="fi" value="${sec.rows}" min="1" max="30"
                onchange="updateSection('${sec.id}', 'rows', parseInt(this.value))" />
            </div>
            <div class="designer-field">
              <label class="fl">Seats/Row</label>
              <input type="number" class="fi" value="${sec.seatsPerRow}" min="1" max="50"
                onchange="updateSection('${sec.id}', 'seatsPerRow', parseInt(this.value))" />
            </div>
            <div class="designer-field">
              <label class="fl">Curve</label>
              <input type="number" class="fi" value="${sec.curveRadius}" min="0" max="1000" step="50"
                onchange="updateSection('${sec.id}', 'curveRadius', parseInt(this.value))" />
            </div>
          </div>

          <div class="designer-field">
            <label class="fl">Assigned Tier</label>
            <select class="fi" onchange="updateSection('${sec.id}', 'tier_id', this.value)">
              ${tiers.map(t => `<option value="${t.id}" ${t.id === sec.tier_id ? 'selected' : ''}>${escapeHTML(t.name)} — $${Number(t.price).toLocaleString()}</option>`).join('')}
              ${tiers.length === 0 ? '<option value="">No tiers available</option>' : ''}
            </select>
          </div>

          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">
            ${sec.rows * sec.seatsPerRow} total seats
          </div>
        </div>
      `).join('');
    }

    // Expose to window for inline handlers
    window.removeSection = function(id) {
      sections = sections.filter(s => s.id !== id);
      renderSectionsList();
    };

    window.updateSection = function(id, field, value) {
      const sec = sections.find(s => s.id === id);
      if (sec) {
        sec[field] = value;
        if (field === 'label') {
          sec.key = value.toLowerCase().replace(/\s+/g, '-');
        }
      }
    };

    /**
     * Generate and display the SVG preview.
     */
    function generatePreview() {
      if (sections.length === 0) {
        document.getElementById('preview-container').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:0.85rem;">Add sections first</div>';
        return;
      }

      const config = {
        stage: {
          label: document.getElementById('stage-label').value || 'STAGE',
          width: parseInt(document.getElementById('stage-width').value) || 500,
          height: parseInt(document.getElementById('stage-height').value) || 70,
        },
        sections: sections.map(s => ({
          key: s.key,
          label: s.label,
          tier_id: s.tier_id,
          rows: s.rows,
          seatsPerRow: s.seatsPerRow,
          curveRadius: s.curveRadius,
        })),
        canvasWidth: 1200,
      };

      currentLayout = generateLayout(config);

      renderPreviewSVG(currentLayout, document.getElementById('preview-container'));
      document.getElementById('save-btn').disabled = false;

      // Stats
      const totalSeats = sections.reduce((sum, s) => sum + (s.rows * s.seatsPerRow), 0);
      const statsEl = document.getElementById('preview-stats');
      statsEl.style.display = 'flex';
      statsEl.innerHTML = `
        <div class="stat-pill"><strong>${totalSeats}</strong> total seats</div>
        <div class="stat-pill"><strong>${sections.length}</strong> section${sections.length !== 1 ? 's' : ''}</div>
        <div class="stat-pill"><strong>${tiers.length}</strong> tier${tiers.length !== 1 ? 's' : ''}</div>
      `;
    }

    /**
     * Save the design to the database.
     */
    async function saveDesign() {
      if (!currentLayout || sections.length === 0) {
        showStatus('⚠️ Generate a preview first.', 'error');
        return;
      }

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:var(--bg-primary);border-radius:50%;animation:spin 0.6s linear infinite;"></span> Saving…';

      try {
        // Build section → tier mapping
        const sectionTiers = {};
        for (const s of sections) {
          sectionTiers[s.key] = s.tier_id;
        }

        const result = await saveVenueMap(eventId, currentLayout, sectionTiers);

        showStatus(`✅ Venue map saved! ${result.seatCount} seats created (v${result.version}). Attendees can now pick seats.`, 'success');
        document.getElementById('delete-btn').style.display = 'block';
      } catch (err) {
        showStatus('❌ ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save & Deploy';
      }
    }

    function showStatus(message, type) {
      const el = document.getElementById('save-status');
      el.style.display = 'block';
      el.textContent = message;
      el.style.background = type === 'success' ? 'rgba(34,197,94,.08)' :
                            type === 'error' ? 'rgba(239,68,68,.08)' :
                            'rgba(59,130,246,.08)';
      el.style.border = `1px solid ${type === 'success' ? 'rgba(34,197,94,.2)' : type === 'error' ? 'rgba(239,68,68,.2)' : 'rgba(59,130,246,.2)'}`;
      el.style.color = type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#3b82f6';

      if (type === 'success' || type === 'info') {
        setTimeout(() => { el.style.display = 'none'; }, 6000);
      }
    }

  </script>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
