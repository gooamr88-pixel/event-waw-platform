<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue Designer — Event Waw</title>
  <meta name="description" content="Professional drag & drop venue layout designer." />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/venue-designer.css" />
  <script src="js/csp.js"></script>
</head>
<body>
  <div class="vd-shell" id="vd-shell">

    <!-- ══════ TOPBAR ══════ -->
    <div class="vd-topbar">
      <div class="vd-topbar-left">
        <a href="dashboard.html" class="vd-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg></a>
        <span class="vd-title">🗺️ Venue <span>Designer</span></span>
        <span class="vd-subtitle" id="ev-subtitle">Loading…</span>
      </div>
      <div class="vd-topbar-center">
        <button class="vd-icon-btn" id="btn-undo" title="Undo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h13a4 4 0 010 8H7"/><path d="M7 6l-4 4 4 4"/></svg></button>
        <button class="vd-icon-btn" id="btn-redo" title="Redo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H8a4 4 0 000 8h9"/><path d="M17 6l4 4-4 4"/></svg></button>
        <div class="vd-sep"></div>
        <button class="vd-icon-btn" id="btn-zi" title="Zoom In"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <span class="vd-zoom-lbl" id="zoom-lbl">100%</span>
        <button class="vd-icon-btn" id="btn-zo" title="Zoom Out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button class="vd-icon-btn" id="btn-zr" title="Reset View"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button>
      </div>
      <div class="vd-topbar-right">
        <button class="vd-icon-btn" id="btn-snap" title="Toggle Grid Snap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
        <button class="vd-icon-btn" id="btn-preview" title="Preview as Attendee"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button class="vd-del-btn" id="btn-del-map" style="display:none;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> Delete Map</button>
        <button class="vd-save-btn" id="btn-save" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save & Deploy
        </button>
      </div>
    </div>

    <!-- ══════ BODY ══════ -->
    <div class="vd-body">
      <!-- LEFT: TOOLBOX + PROPERTIES -->
      <div class="vd-toolbox">
        <div class="vd-tb-section">
          <div class="vd-tb-label">Quick Templates</div>
          <div class="vd-template-grid" id="template-grid">
            <button class="vd-tpl-btn" data-template="theater" title="Theater Layout">🎭<span>Theater</span></button>
            <button class="vd-tpl-btn" data-template="arena" title="Arena Layout">🏟️<span>Arena</span></button>
            <button class="vd-tpl-btn" data-template="classroom" title="Classroom Layout">🏫<span>Class</span></button>
            <button class="vd-tpl-btn" data-template="tables" title="Round Tables">🍽️<span>Tables</span></button>
            <button class="vd-tpl-btn" data-template="stadium" title="Stadium Layout">⚽<span>Stadium</span></button>
          </div>
        </div>
        <div class="vd-tb-section">
          <div class="vd-tb-label">Elements</div>
          <div class="vd-tb-grid" id="tb-grid"></div>
        </div>
        <div class="vd-tb-section" style="border-bottom:none;">
          <div class="vd-tb-label">Properties</div>
        </div>
        <div class="vd-props-scroll" id="props-panel">
          <p class="vd-props-empty">Click an element<br/>to edit properties</p>
        </div>
      </div>

      <!-- CENTER: CANVAS -->
      <div class="vd-canvas-area">
        <div class="vd-canvas-inner" id="vd-canvas"></div>
        <div class="vd-shortcuts">
          <span class="vd-shortcut"><kbd>Ctrl+Z</kbd> Undo</span>
          <span class="vd-shortcut"><kbd>Del</kbd> Remove</span>
          <span class="vd-shortcut"><kbd>Ctrl+D</kbd> Clone</span>
          <span class="vd-shortcut"><kbd>Scroll</kbd> Zoom</span>
        </div>
        <div class="vd-toast" id="vd-toast" style="display:none;"></div>
        <div class="vd-stats" id="vd-stats"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './src/lib/supabase.js';
    import { getEvent } from './src/lib/events.js';
    import { protectPage } from './src/lib/guard.js';
    import { escapeHTML } from './src/lib/utils.js';
    import { ELEMENT_TYPES, VenueDesignerEngine, saveVenueMapV2 } from './src/lib/venue-designer-v2.js';
    import { loadVenueMap, deleteVenueMap } from './src/lib/venue-designer.js';

    let engine, eventId, tiers = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const auth = await protectPage('organizer');
      const params = new URLSearchParams(location.search);
      eventId = params.get('event_id');
      if (!eventId) { alert('Missing event_id'); location.href = 'dashboard.html'; return; }

      try {
        const ev = await getEvent(eventId);
        document.getElementById('ev-subtitle').textContent = ev.title;
        tiers = ev.ticket_tiers || [];
      } catch (e) { alert('Event load failed: ' + e.message); return; }

      // Init engine
      engine = new VenueDesignerEngine(document.getElementById('vd-canvas'), {
        tiers,
        snapToGrid: true,
        onChange: () => {
          document.getElementById('btn-save').disabled = false;
          updateProps(); updateStats();
        },
      });

      buildToolbox();
      wireButtons();
      wireTemplates();
      wireSnap();

      // Load existing
      try {
        const existing = await loadVenueMap(eventId);
        if (existing) {
          engine.loadFromJSON(existing.layout_json);
          document.getElementById('btn-del-map').style.display = '';
          toast('Editing v' + (existing.version || 1), 'info');
        } else {
          engine.addElement('stage', 400, 40);
        }
      } catch (_) { engine.addElement('stage', 400, 40); }

      updateStats();
    });

    /* ── Toolbox ── */
    function buildToolbox() {
      const g = document.getElementById('tb-grid');
      g.innerHTML = Object.entries(ELEMENT_TYPES).map(([k, t]) =>
        `<div class="vd-tb-item" draggable="true" data-type="${k}" title="${t.label}">
          <span class="vd-tb-item-icon">${t.icon}</span>
          <span class="vd-tb-item-name">${t.label}</span>
          <span class="vd-tb-color" style="background:${t.color}"></span>
        </div>`
      ).join('');
      g.querySelectorAll('.vd-tb-item').forEach(item => {
        item.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', item.dataset.type);
          e.dataTransfer.effectAllowed = 'copy';
        });
        item.addEventListener('click', () => engine.addElement(item.dataset.type));
      });
    }

    /* ── Properties ── */
    function updateProps() {
      const p = document.getElementById('props-panel');
      const el = engine.getSelected();
      if (!el) { p.innerHTML = '<p class="vd-props-empty">Click an element<br/>to edit properties</p>'; return; }

      const t = ELEMENT_TYPES[el.type.toUpperCase()] || {};
      let h = `<div class="vd-ph"><span class="vd-ph-name">${t.icon||''} ${escapeHTML(el.label)}</span><span class="vd-ph-type">${t.label||el.type}</span></div>`;
      h += field('Label', 'text', el.label, 'label');
      h += `<div class="vd-row">${field('X','number',el.x,'x')}${field('Y','number',el.y,'y')}</div>`;
      h += `<div class="vd-row">${field('W','number',el.w||80,'w')}${field('H','number',el.h||80,'h')}</div>`;
      h += `<div class="vd-fg"><label>Rotate</label><input type="range" class="vd-slider" value="${el.rotation||0}" min="0" max="360" data-p="rotation"><span class="vd-slider-v">${el.rotation||0}°</span></div>`;
      h += `<div class="vd-fg"><label>Color</label><input type="color" class="vd-color" value="${el.color}" data-p="color"></div>`;

      if (el.type === 'section') {
        h += '<div class="vd-divider"></div>';
        h += `<div class="vd-row">${field('Rows','number',el.rows,'rows')}${field('Seats/Row','number',el.seatsPerRow,'seatsPerRow')}</div>`;
        h += `<div class="vd-fg"><label>Curve</label><input type="range" class="vd-slider" value="${el.curve||0}" min="0" max="500" data-p="curve"><span class="vd-slider-v">${el.curve||0}</span></div>`;
        if (tiers.length) {
          h += `<div class="vd-fg"><label>Tier</label><select class="vd-fi" data-p="tier_id">${tiers.map(t=>`<option value="${t.id}" ${t.id===el.tier_id?'selected':''}>${escapeHTML(t.name)} — $${Number(t.price).toLocaleString()}</option>`).join('')}</select></div>`;
        }
        h += `<div class="vd-seats-info">${el.rows * el.seatsPerRow} seats</div>`;
      }
      if (el.type === 'table') {
        h += '<div class="vd-divider"></div>';
        h += field('Seats','number',el.seats||6,'seats');
      }

      h += '<div class="vd-divider"></div>';
      h += `<div class="vd-actions">
        <button class="vd-act" id="pa-dup" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
        <button class="vd-act" id="pa-up" title="Bring Front"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="18 15 12 9 6 15"/></svg></button>
        <button class="vd-act" id="pa-dn" title="Send Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg></button>
        <button class="vd-act" id="pa-lk" title="Lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">${el.locked ? '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>' : '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 019.9-1"/>'}</svg></button>
        <button class="vd-act vd-act-del" id="pa-rm" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
      </div>`;

      p.innerHTML = h;

      // Bind
      p.querySelectorAll('[data-p]').forEach(inp => {
        const ev = (inp.type==='range') ? 'input' : 'change';
        inp.addEventListener(ev, () => {
          let v = inp.value;
          if (inp.type==='number'||inp.type==='range') v = parseFloat(v)||0;
          engine.updateSelected({ [inp.dataset.p]: v });
          const vs = inp.nextElementSibling;
          if (vs && vs.classList.contains('vd-slider-v')) vs.textContent = v + (inp.dataset.p==='rotation'?'°':'');
          const si = p.querySelector('.vd-seats-info');
          if (si) { const s = engine.getSelected(); if(s) si.textContent = `${s.rows*s.seatsPerRow} seats`; }
        });
      });
      document.getElementById('pa-dup')?.addEventListener('click', () => engine.duplicateSelected());
      document.getElementById('pa-up')?.addEventListener('click', () => engine.bringToFront());
      document.getElementById('pa-dn')?.addEventListener('click', () => engine.sendToBack());
      document.getElementById('pa-lk')?.addEventListener('click', () => { engine.toggleLock(); updateProps(); });
      document.getElementById('pa-rm')?.addEventListener('click', () => { engine.removeSelected(); updateProps(); });
    }

    function field(label, type, val, prop) {
      return `<div class="vd-fg"><label>${label}</label><input type="${type}" class="vd-fi" value="${typeof val==='string'?escapeHTML(val):val}" data-p="${prop}"></div>`;
    }

    /* ── Stats ── */
    function updateStats() {
      const secs = engine.elements.filter(e => e.type==='section');
      const tbls = engine.elements.filter(e => e.type==='table');
      const seats = secs.reduce((s,e) => s+(e.rows*e.seatsPerRow),0) + tbls.reduce((s,e) => s+(e.seats||6),0);
      document.getElementById('vd-stats').innerHTML =
        `<span class="vd-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg> <b>${engine.elements.length}</b> elements</span>` +
        `<span class="vd-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> <b>${seats}</b> seats</span>` +
        `<span class="vd-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> <b>${secs.length}</b> sections</span>`;
    }

    /* ── Topbar ── */
    function wireButtons() {
      document.getElementById('btn-undo').onclick = () => engine.undo();
      document.getElementById('btn-redo').onclick = () => engine.redo();
      document.getElementById('btn-zi').onclick = () => { engine.zoomIn(); updZoom(); };
      document.getElementById('btn-zo').onclick = () => { engine.zoomOut(); updZoom(); };
      document.getElementById('btn-zr').onclick = () => { engine.resetView(); updZoom(); };

      document.getElementById('btn-save').onclick = async () => {
        const btn = document.getElementById('btn-save');
        btn.disabled = true; btn.textContent = 'Saving…';
        try {
          const st = {};
          engine.elements.filter(e=>e.type==='section').forEach(s => {
            st[s.label.toLowerCase().replace(/\s+/g,'-')] = s.tier_id;
          });
          const r = await saveVenueMapV2(eventId, engine, st);
          toast(`✅ ${r.seatCount} seats saved (v${r.version})`, 'success');
          document.getElementById('btn-del-map').style.display = '';
        } catch (e) { toast('❌ ' + e.message, 'error'); }
        finally {
          btn.disabled = false;
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save & Deploy';
        }
      };

      document.getElementById('btn-del-map').onclick = async () => {
        if (!confirm('Delete venue map and all seats?')) return;
        try {
          await deleteVenueMap(eventId);
          toast('Map deleted', 'success');
          document.getElementById('btn-del-map').style.display = 'none';
          engine.elements = []; engine.state.selectedId = null;
          engine.addElement('stage', 400, 40);
          updateProps(); updateStats();
        } catch (e) { toast('❌ ' + e.message, 'error'); }
      };
    }

    function updZoom() {
      document.getElementById('zoom-lbl').textContent = Math.round(engine.state.zoom*100) + '%';
    }

    function toast(msg, type='info') {
      const t = document.getElementById('vd-toast');
      t.textContent = msg; t.className = 'vd-toast vd-toast-' + type; t.style.display = '';
      clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 4000);
    }

    /* ── Templates ── */
    const TEMPLATES = {
      theater: {
        label: 'Theater',
        build: () => {
          engine.elements = []; engine.state.selectedId = null;
          engine.addElement('stage', 400, 30);
          const sectionConfigs = [
            { label: 'Orchestra Left', x: 80, y: 130, w: 280, h: 200, rows: 8, seats: 10, curve: 80 },
            { label: 'Orchestra Center', x: 370, y: 110, w: 320, h: 220, rows: 9, seats: 12, curve: 120 },
            { label: 'Orchestra Right', x: 700, y: 130, w: 280, h: 200, rows: 8, seats: 10, curve: 80 },
            { label: 'Balcony Left', x: 120, y: 380, w: 240, h: 140, rows: 5, seats: 10, curve: 40 },
            { label: 'Balcony Center', x: 400, y: 370, w: 260, h: 150, rows: 5, seats: 12, curve: 60 },
            { label: 'Balcony Right', x: 700, y: 380, w: 240, h: 140, rows: 5, seats: 10, curve: 40 },
          ];
          sectionConfigs.forEach(c => {
            const el = engine.addElement('section', c.x, c.y);
            Object.assign(el, { label: c.label, w: c.w, h: c.h, rows: c.rows, seatsPerRow: c.seats, curve: c.curve });
            if (tiers.length) el.tier_id = tiers[0].id;
          });
          engine.addElement('exit', 20, 550);
          engine.addElement('exit', 980, 550);
          engine.addElement('entrance', 500, 580);
          engine.render();
        }
      },
      arena: {
        label: 'Arena',
        build: () => {
          engine.elements = []; engine.state.selectedId = null;
          engine.addElement('stage', 350, 320);
          const arenaConfigs = [
            { label: 'North', x: 350, y: 30, w: 360, h: 160, rows: 6, seats: 14, curve: 200 },
            { label: 'South', x: 350, y: 450, w: 360, h: 160, rows: 6, seats: 14, curve: 200 },
            { label: 'West', x: 30, y: 120, w: 200, h: 380, rows: 8, seats: 6, curve: 0 },
            { label: 'East', x: 830, y: 120, w: 200, h: 380, rows: 8, seats: 6, curve: 0 },
            { label: 'VIP North', x: 420, y: 200, w: 220, h: 80, rows: 3, seats: 10, curve: 100 },
          ];
          arenaConfigs.forEach((c, i) => {
            const el = engine.addElement('section', c.x, c.y);
            Object.assign(el, { label: c.label, w: c.w, h: c.h, rows: c.rows, seatsPerRow: c.seats, curve: c.curve });
            if (tiers.length > 1 && i === 4) el.tier_id = tiers[1].id;
            else if (tiers.length) el.tier_id = tiers[0].id;
          });
          engine.addElement('bar', 30, 30);
          engine.addElement('food', 930, 30);
          engine.addElement('restroom', 30, 600);
          engine.addElement('entrance', 930, 600);
          engine.render();
        }
      },
      classroom: {
        label: 'Classroom',
        build: () => {
          engine.elements = []; engine.state.selectedId = null;
          engine.addElement('stage', 350, 30);
          engine.addElement('screen', 350, 100);
          for (let row = 0; row < 5; row++) {
            const el = engine.addElement('section', 150, 150 + row * 100);
            Object.assign(el, { label: `Row ${row + 1}`, w: 800, h: 70, rows: 2, seatsPerRow: 16, curve: 0 });
            if (tiers.length) el.tier_id = tiers[0].id;
          }
          engine.addElement('entrance', 50, 700);
          engine.addElement('exit', 950, 700);
          engine.render();
        }
      },
      tables: {
        label: 'Round Tables',
        build: () => {
          engine.elements = []; engine.state.selectedId = null;
          engine.addElement('stage', 350, 20);
          engine.addElement('dj', 520, 100);
          const positions = [
            [200, 200], [450, 200], [700, 200],
            [120, 380], [350, 380], [580, 380], [810, 380],
            [200, 560], [450, 560], [700, 560]
          ];
          positions.forEach((p, i) => {
            const el = engine.addElement('table', p[0], p[1]);
            el.label = `T${i + 1}`;
            el.seats = 8;
          });
          engine.addElement('bar', 40, 700);
          engine.addElement('restroom', 900, 700);
          engine.addElement('entrance', 480, 720);
          engine.render();
        }
      },
      stadium: {
        label: 'Stadium',
        build: () => {
          engine.elements = []; engine.state.selectedId = null;
          const el = engine.addElement('stage', 300, 280);
          Object.assign(el, { w: 500, h: 80, label: 'PITCH' });
          const stadiumConfigs = [
            { label: 'North Stand', x: 300, y: 20, w: 500, h: 120, rows: 5, seats: 20, curve: 300 },
            { label: 'South Stand', x: 300, y: 410, w: 500, h: 120, rows: 5, seats: 20, curve: 300 },
            { label: 'West Stand', x: 30, y: 80, w: 180, h: 400, rows: 10, seats: 6, curve: 0 },
            { label: 'East Stand', x: 890, y: 80, w: 180, h: 400, rows: 10, seats: 6, curve: 0 },
            { label: 'VIP Box', x: 400, y: 180, w: 300, h: 60, rows: 2, seats: 14, curve: 80 },
          ];
          stadiumConfigs.forEach((c, i) => {
            const el = engine.addElement('section', c.x, c.y);
            Object.assign(el, { label: c.label, w: c.w, h: c.h, rows: c.rows, seatsPerRow: c.seats, curve: c.curve });
            if (tiers.length > 1 && i === 4) el.tier_id = tiers[1].id;
            else if (tiers.length) el.tier_id = tiers[0].id;
          });
          engine.addElement('entrance', 50, 580);
          engine.addElement('entrance', 1000, 580);
          engine.addElement('food', 50, 20);
          engine.addElement('restroom', 1000, 20);
          engine.render();
        }
      }
    };

    function wireTemplates() {
      document.getElementById('template-grid').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-template]');
        if (!btn) return;
        const tplId = btn.dataset.template;
        const tpl = TEMPLATES[tplId];
        if (!tpl) return;
        if (engine.elements.length > 1 && !confirm(`Replace current layout with "${tpl.label}" template?`)) return;
        tpl.build();
        document.getElementById('btn-save').disabled = false;
        toast(`✨ ${tpl.label} template applied`, 'success');
        updateProps(); updateStats();
      });
    }

    function wireSnap() {
      let snapOn = true;
      const btn = document.getElementById('btn-snap');
      btn.style.color = '#d4af37';
      btn.addEventListener('click', () => {
        snapOn = !snapOn;
        engine.snapToGrid = snapOn;
        btn.style.color = snapOn ? '#d4af37' : '#52525b';
        toast(snapOn ? 'Grid snap ON' : 'Grid snap OFF', 'info');
      });
    }
  </script>
</body>
</html>
