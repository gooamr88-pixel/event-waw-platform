<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ticket Scanner — Eventsli</title>
  <meta name="description" content="Scan QR codes to validate event tickets." />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/bridge.css" />
  <link rel="stylesheet" href="css/motion.css" />
  <link rel="stylesheet" href="css/polish.css" />
  <link rel="stylesheet" href="css/styles.css?v=1778306045" />
  <link rel="stylesheet" href="css/light-theme.css?v=1778303702" />
  <link rel="stylesheet" href="css/theme.css?v=1778306046" />
  <link rel="stylesheet" href="css/mobile-ios.css?v=1778308900" />
  <link rel="icon" type="image/png" href="images/favicon-v2.png" />
  <script>var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t)</script>
  <script src="js/csp.js"></script>
  <meta name="theme-color" content="#09090b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>

  <!-- ══════ SCANNER UI ══════ -->
  <div class="scanner-app">

    <!-- Header -->
    <div class="scanner-header">
      <a href="dashboard.html" class="scanner-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
      </a>
      <div>
        <h1 style="font-size:1.1rem;font-weight:700;font-family:var(--font-serif);">Ticket Scanner</h1>
        <p id="scanner-event-name" style="font-size:0.75rem;color:var(--text-muted);">Select an event</p>
      </div>
      <div id="scanner-stats" style="text-align:right;">
        <p style="font-size:1.5rem;font-weight:800;color:var(--accent-primary);" id="scan-count">0</p>
        <p style="font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Scanned</p>
      </div>
    </div>

    <!-- Camera View -->
    <div class="scanner-camera-wrap">
      <div id="scanner-viewfinder" class="scanner-viewfinder">
        <!-- html5-qrcode renders here -->
      </div>
      <div class="scanner-overlay">
        <div class="scanner-frame"></div>
      </div>
      <p class="scanner-hint">Point camera at QR code</p>
    </div>

    <!-- Result Flash -->
    <div id="scanner-result" class="scanner-result" style="display:none;">
      <div id="result-icon" class="result-icon">✓</div>
      <!-- Entry type badge (Phase 5) -->
      <div id="result-entry-badge" class="result-entry-badge" style="display:none;">FIRST ENTRY</div>
      <h2 id="result-title">Valid Ticket</h2>
      <p id="result-detail">General Admission — Fadi Auchi</p>
      <!-- Scan counter (Phase 5) -->
      <div id="result-scan-info" class="result-scan-info" style="display:none;">
        <div class="result-scan-counter">
          <span id="result-scan-count">1</span> / <span id="result-scan-max">3</span>
        </div>
        <div id="result-scan-label" class="result-scan-label">entries used</div>
      </div>
      <!-- Seat location box (hidden for GA) -->
      <div id="result-seat-box" class="result-seat-box" style="display:none;">
        <div class="result-seat-label">YOUR SEAT</div>
        <div class="result-seat-grid">
          <div class="result-seat-cell">
            <span class="result-seat-key">Section</span>
            <span class="result-seat-val" id="result-seat-section">—</span>
          </div>
          <div class="result-seat-cell">
            <span class="result-seat-key">Row</span>
            <span class="result-seat-val" id="result-seat-row">—</span>
          </div>
          <div class="result-seat-cell">
            <span class="result-seat-key">Seat</span>
            <span class="result-seat-val" id="result-seat-number">—</span>
          </div>
        </div>
      </div>
      <button class="btn btn-outline" id="result-dismiss" style="margin-top:20px;">Scan Next</button>
    </div>

    <!-- Manual Entry + Manual Check-in -->
    <div class="scanner-manual">
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" id="manual-toggle">⌨️ Manual QR Entry</button>
        <button class="btn btn-outline btn-sm" id="checkin-toggle" style="border-color:var(--accent-primary);color:var(--accent-primary)">🔍 Manual Check-in</button>
      </div>
      <div id="manual-form" style="display:none;margin-top:12px;">
        <div style="display:flex;gap:8px;">
          <input type="text" class="fi" id="manual-input" placeholder="Enter ticket ID / QR payload…" style="flex:1;" />
          <button class="btn btn-primary btn-sm" id="manual-submit">Verify</button>
        </div>
      </div>
      <!-- Manual Check-in Panel -->
      <div id="checkin-panel" style="display:none;margin-top:16px;">
        <div style="margin-bottom:12px">
          <label style="font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Select Event</label>
          <select class="fi" id="checkin-event-select" style="width:100%;font-size:.85rem">
            <option value="">Loading events…</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input type="text" class="fi" id="checkin-search" placeholder="Search by name, email, or order ID…" style="flex:1" />
          <button class="btn btn-primary btn-sm" id="checkin-search-btn">Search</button>
        </div>
        <div id="checkin-results" style="max-height:320px;overflow-y:auto">
          <p style="color:var(--text-muted);font-size:.82rem;text-align:center;padding:12px 0">Select an event and search for an attendee</p>
        </div>
      </div>
    </div>

    <!-- Scan History -->
    <div class="scanner-history">
      <h3 style="font-size:0.85rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em;">Recent Scans</h3>
      <div id="scan-history-list">
        <p style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:16px 0;">No scans yet</p>
      </div>
    </div>
  </div>

  <style>
    .scanner-app {
      min-height: 100vh; display: flex; flex-direction: column;
      max-width: 480px; margin: 0 auto; padding: 0 16px;
    }
    .scanner-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 0; position: sticky; top: 0; z-index: 10;
      background: var(--bg-primary);
    }
    .scanner-back {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--bg-glass); border: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); transition: var(--transition); flex-shrink: 0;
    }
    .scanner-back:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .scanner-header > div:first-of-type { flex: 1; }

    .scanner-camera-wrap {
      position: relative; width: 100%; aspect-ratio: 1;
      border-radius: 20px; overflow: hidden;
      background: #000; margin-bottom: 16px;
    }
    .scanner-viewfinder { width: 100%; height: 100%; }
    .scanner-viewfinder video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
    .scanner-overlay {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 2;
    }
    .scanner-frame {
      width: clamp(160px, 45vw, 200px); height: clamp(160px, 45vw, 200px);
      border: 2px solid var(--accent-primary);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.4);
      animation: scanPulse 2s ease-in-out infinite;
    }
    @keyframes scanPulse {
      0%,100% { border-color: rgba(212,175,55,.5); box-shadow: 0 0 0 9999px rgba(0,0,0,.4), 0 0 20px rgba(212,175,55,.1); }
      50% { border-color: var(--accent-primary); box-shadow: 0 0 0 9999px rgba(0,0,0,.4), 0 0 30px rgba(212,175,55,.25); }
    }
    .scanner-hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 3; color: rgba(255,255,255,.7); font-size: 0.8rem;
      background: rgba(0,0,0,.5); padding: 6px 16px; border-radius: 50px;
      backdrop-filter: blur(8px);
    }

    /* Result Flash */
    .scanner-result {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: clamp(16px, 3vw, 24px);
      animation: resultIn 0.3s ease;
    }
    .scanner-result.valid { background: rgba(16, 80, 30, 0.97); }
    .scanner-result.invalid { background: rgba(130, 20, 20, 0.97); }
    .scanner-result.duplicate { background: rgba(130, 90, 10, 0.97); }
    .scanner-result.reentry { background: rgba(15, 50, 120, 0.97); }
    .scanner-result.locked { background: rgba(100, 10, 10, 0.98); }
    @keyframes resultIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }

    .result-icon {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin-bottom: 20px; font-weight: bold;
    }
    .scanner-result.valid .result-icon { background: rgba(34,197,94,.2); border: 2px solid #22c55e; color: #22c55e; }
    .scanner-result.invalid .result-icon { background: rgba(239,68,68,.2); border: 2px solid #ef4444; color: #ef4444; }
    .scanner-result.duplicate .result-icon { background: rgba(234,179,8,.2); border: 2px solid #eab308; color: #eab308; }
    .scanner-result.reentry .result-icon { background: rgba(59,130,246,.2); border: 2px solid #3b82f6; color: #3b82f6; }
    .scanner-result.locked .result-icon { background: rgba(239,68,68,.3); border: 2px solid #ef4444; color: #ef4444; }
    .locked-debt-card { margin-top:20px; padding:16px 20px; background:rgba(0,0,0,.3); border-radius:14px; border:1px solid rgba(239,68,68,.3); max-width:340px; }
    .locked-debt-card .locked-debt-label { font-size:.7rem; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
    .locked-debt-card .locked-debt-amount { font-size:1.6rem; font-weight:800; color:#fff; font-family:var(--font-serif); }
    .locked-debt-card .locked-debt-info { font-size:.8rem; color:rgba(255,255,255,.6); margin-top:10px; line-height:1.5; }

    /* Phase 5: Entry type badge */
    .result-entry-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .scanner-result.valid .result-entry-badge { background: rgba(34,197,94,.2); color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
    .scanner-result.reentry .result-entry-badge { background: rgba(59,130,246,.2); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }

    /* Phase 5: Scan counter */
    .result-scan-info {
      margin-top: 16px;
      padding: 12px 24px;
      background: rgba(0,0,0,.2);
      border-radius: 12px;
      text-align: center;
    }
    .result-scan-counter {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 800;
      color: #fff;
      font-family: var(--font-serif);
    }
    .result-scan-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .scanner-result h2 { font-family: var(--font-serif); font-size: clamp(1.4rem, 4vw, 1.8rem); font-weight: 700; margin-bottom: 8px; color: #fff; }
    .scanner-result p { color: rgba(255,255,255,.7); font-size: 0.95rem; }

    /* Seat location box — prominent green display */
    .result-seat-box {
      margin-top: 20px;
      padding: clamp(14px, 3vw, 20px);
      background: rgba(34,197,94,.12);
      border: 2px solid rgba(34,197,94,.4);
      border-radius: 16px;
      width: 100%;
      max-width: 340px;
      animation: seatBoxIn 0.4s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes seatBoxIn { from { opacity:0; transform:scale(.9) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .result-seat-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #22c55e;
      margin-bottom: 12px;
      text-align: center;
    }
    .result-seat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .result-seat-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      background: rgba(0,0,0,.2);
      border-radius: 10px;
    }
    .result-seat-key {
      font-size: 0.65rem;
      color: rgba(255,255,255,.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .result-seat-val {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 800;
      color: #ffffff;
      font-family: var(--font-serif);
    }

    .scanner-manual { padding: 8px 0; text-align: center; }

    .scanner-history {
      flex: 1; padding: 16px 0 24px;
    }
    .scan-entry {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem;
    }
    .scan-entry-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
    }
    .scan-entry-icon.valid { background: rgba(34,197,94,.1); color: #22c55e; }
    .scan-entry-icon.invalid { background: rgba(239,68,68,.1); color: #ef4444; }
    .scan-entry-icon.duplicate { background: rgba(234,179,8,.1); color: #eab308; }
  </style>

  <script type="module">
    import { getCurrentUser } from './src/lib/supabase.js';
    import { supabase } from './src/lib/supabase.js';
    import { verifyTicket } from './src/lib/tickets.js';
    import { protectPage } from './src/lib/guard.js';
    import { getOrganizerEvents } from './src/lib/events.js';
    import { Html5Qrcode } from 'https://esm.sh/html5-qrcode@2';

    let scanner = null;
    let scanCount = 0;
    let scanHistory = [];
    let isProcessing = false;

    // XSS protection for QR data displayed in history
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = String(str || '');
      return d.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);

      const auth = await protectPage({ requireRole: 'organizer' });
      if (!auth) return; // Redirecting...

      initScanner();
      initManualEntry();
      initManualCheckin();
      initResultDismiss();
    });

    async function initScanner() {
      try {
        scanner = new Html5Qrcode('scanner-viewfinder');
        await scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 200, height: 200 }, aspectRatio: 1 },
          onScanSuccess,
          () => {} // ignore failures
        );
      } catch (err) {
        console.error('Camera error:', err);
        document.querySelector('.scanner-hint').textContent = 'Camera access denied. Use manual entry below.';
      }
    }

    async function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      // Haptic feedback
      if (navigator.vibrate) navigator.vibrate(100);

      try {
        const result = await verifyTicket(decodedText);

        // Phase 5: Parse multi-scan response from scan_ticket RPC
        if (result.valid) {
          const scanResult = result.scan_result || 'admitted';
          const isReentry = scanResult === 're_entry';
          const isDuplicate = scanResult === 'duplicate';
          const isUnlimited = result.is_unlimited || false;
          const scansRemaining = result.scans_remaining;
          const scanCount_ = result.scan_count || 1;
          const maxScans = result.max_scans || 1;

          // Build detail string
          let detail = result.tier_name || 'Admission';
          if (result.buyer_name) detail += ` — ${result.buyer_name}`;

          // Build scan info for display
          const scanInfo = {
            count: scanCount_,
            max: maxScans,
            remaining: scansRemaining,
            isUnlimited,
            isReentry,
          };

          if (isDuplicate) {
            // Rapid re-scan cooldown
            showResult('duplicate', 'Already Scanned', result.message || 'Cooldown active', result, scanInfo);
            playSound('warning');
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            addToHistory('duplicate', 'Duplicate scan', decodedText);
          } else if (isReentry) {
            // Re-entry scan
            let reLabel = isUnlimited ? 'Unlimited Re-entry' : `${scansRemaining} scan${scansRemaining !== 1 ? 's' : ''} remaining`;
            showResult('reentry', 'Re-entry Granted', detail, result, scanInfo);
            playSound('success');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            scanCount++;
            document.getElementById('scan-count').textContent = scanCount;
            addToHistory('valid', `Re-entry | ${result.tier_name || 'Ticket'}`, decodedText);
          } else {
            // First entry
            showResult('valid', 'Access Granted', detail, result, scanInfo);
            playSound('success');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            scanCount++;
            document.getElementById('scan-count').textContent = scanCount;

            let histLabel = result.tier_name || 'Valid';
            if (result.section) histLabel += ` | ${result.section} R${result.row} S${result.seat}`;
            addToHistory('valid', histLabel, decodedText);
          }
        } else if (result.locked) {
          // ── KILL-SWITCH: Scanner locked due to unpaid commission ──
          showResult('locked', '⛔ Scanner Locked', 'Unpaid commission debt', result);
          playSound('error');
          if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
          addToHistory('invalid', 'LOCKED — Unpaid commission', decodedText);
        } else {
          // Rejected
          const message = result.message || result.error || 'Ticket not recognized';
          showResult('invalid', 'Entry Denied', message, result);
          playSound('error');
          if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);

          let histLabel = 'Rejected';
          if (result.scan_count && result.max_scans) histLabel = `Max reached (${result.scan_count}/${result.max_scans})`;
          addToHistory('invalid', histLabel, decodedText);
        }
      } catch (err) {
        showResult('invalid', 'Error', err.message || 'Verification failed');
        addToHistory('invalid', 'Error', decodedText);
      }
    }

    function showResult(type, title, detail, resultData, scanInfo) {
      const el = document.getElementById('scanner-result');
      el.className = `scanner-result ${type}`;
      document.getElementById('result-icon').textContent =
        type === 'valid' ? '✓' : type === 'reentry' ? '↻' : type === 'duplicate' ? '⚠' : type === 'locked' ? '🔒' : '✕';
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-detail').textContent = detail;

      // ── Kill-switch lock screen ──
      const existingDebtCard = el.querySelector('.locked-debt-card');
      if (existingDebtCard) existingDebtCard.remove();
      if (type === 'locked' && resultData) {
        const debtCard = document.createElement('div');
        debtCard.className = 'locked-debt-card';
        debtCard.innerHTML = `
          <div class="locked-debt-label">Outstanding Commission</div>
          <div class="locked-debt-amount">${resultData.balance || '—'} USD</div>
          <div class="locked-debt-info">
            Ticket scanning is disabled because this event has unpaid platform commission.<br><br>
            Please settle your commission debt via the Financial panel in your dashboard, or contact <strong>support@eventsli.com</strong>.
          </div>
        `;
        el.querySelector('#result-detail').after(debtCard);
      }

      // Phase 5: Entry type badge
      const badge = document.getElementById('result-entry-badge');
      if (type === 'valid') {
        badge.textContent = 'FIRST ENTRY';
        badge.style.display = 'inline-block';
      } else if (type === 'reentry') {
        badge.textContent = 'RE-ENTRY';
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }

      // Phase 5: Scan counter
      const scanInfoEl = document.getElementById('result-scan-info');
      if (scanInfo && (type === 'valid' || type === 'reentry')) {
        if (scanInfo.isUnlimited) {
          document.getElementById('result-scan-count').textContent = scanInfo.count;
          document.getElementById('result-scan-max').textContent = '∞';
          document.getElementById('result-scan-label').textContent = 'unlimited re-entry';
        } else {
          document.getElementById('result-scan-count').textContent = scanInfo.count;
          document.getElementById('result-scan-max').textContent = scanInfo.max;
          const left = scanInfo.remaining;
          document.getElementById('result-scan-label').textContent =
            left === 0 ? 'final entry — no more scans' :
            `${left} scan${left !== 1 ? 's' : ''} remaining`;
        }
        scanInfoEl.style.display = 'block';
      } else {
        scanInfoEl.style.display = 'none';
      }

      // Show seat location box for seated tickets
      const seatBox = document.getElementById('result-seat-box');
      if ((type === 'valid' || type === 'reentry' || type === 'duplicate') && resultData?.section) {
        document.getElementById('result-seat-section').textContent = resultData.section;
        document.getElementById('result-seat-row').textContent = resultData.row || '—';
        document.getElementById('result-seat-number').textContent = resultData.seat || '—';
        seatBox.style.display = 'block';
      } else {
        seatBox.style.display = 'none';
      }

      el.style.display = 'flex';
    }

    function initResultDismiss() {
      document.getElementById('result-dismiss').addEventListener('click', () => {
        document.getElementById('scanner-result').style.display = 'none';
        isProcessing = false;
      });
    }

    function addToHistory(type, label, data) {
      const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
      scanHistory.unshift({ type, label, data, time });
      
      const list = document.getElementById('scan-history-list');
      list.innerHTML = scanHistory.slice(0, 20).map(entry => `
        <div class="scan-entry">
          <div class="scan-entry-icon ${entry.type}">${entry.type === 'valid' ? '✓' : entry.type === 'duplicate' ? '⚠' : '✕'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:0.85rem;">${escapeHtml(entry.label)}</div>
            <div style="font-size:0.7rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(entry.data).substring(0, 32)}…</div>
          </div>
          <div style="font-size:0.7rem;color:var(--text-muted);flex-shrink:0;">${entry.time}</div>
        </div>
      `).join('');
    }

    function initManualEntry() {
      document.getElementById('manual-toggle').addEventListener('click', () => {
        const form = document.getElementById('manual-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        if (form.style.display === 'block') document.getElementById('manual-input').focus();
      });

      document.getElementById('manual-submit').addEventListener('click', async () => {
        const input = document.getElementById('manual-input');
        const val = input.value.trim();
        if (val) {
          await onScanSuccess(val);
          input.value = '';
        }
      });

      document.getElementById('manual-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('manual-submit').click();
      });
    }

    // ══════ MANUAL CHECK-IN ══════
    async function initManualCheckin() {
      const toggleBtn = document.getElementById('checkin-toggle');
      const panel = document.getElementById('checkin-panel');
      const eventSelect = document.getElementById('checkin-event-select');
      const searchInput = document.getElementById('checkin-search');
      const searchBtn = document.getElementById('checkin-search-btn');
      const resultsDiv = document.getElementById('checkin-results');

      // Toggle panel
      toggleBtn.addEventListener('click', () => {
        const isHidden = panel.style.display === 'none';
        panel.style.display = isHidden ? 'block' : 'none';
        toggleBtn.style.background = isHidden ? 'var(--accent-primary)' : '';
        toggleBtn.style.color = isHidden ? '#fff' : 'var(--accent-primary)';
        // Hide QR manual entry
        if (isHidden) document.getElementById('manual-form').style.display = 'none';
      });

      // Load organizer events into dropdown
      try {
        const events = await getOrganizerEvents();
        eventSelect.innerHTML = '<option value="">Select an event…</option>';
        events.forEach(ev => {
          const opt = document.createElement('option');
          opt.value = ev.id;
          opt.textContent = ev.title;
          eventSelect.appendChild(opt);
        });
      } catch (e) {
        eventSelect.innerHTML = '<option value="">Failed to load events</option>';
      }

      // Search
      async function doSearch() {
        const eventId = eventSelect.value;
        const query = searchInput.value.trim();
        if (!eventId) {
          resultsDiv.innerHTML = '<p style="color:#f59e0b;font-size:.82rem;text-align:center;padding:12px">⚠ Please select an event first</p>';
          return;
        }
        if (query.length < 2) {
          resultsDiv.innerHTML = '<p style="color:#f59e0b;font-size:.82rem;text-align:center;padding:12px">⚠ Type at least 2 characters</p>';
          return;
        }

        resultsDiv.innerHTML = '<p style="color:var(--text-muted);font-size:.82rem;text-align:center;padding:12px">Searching…</p>';

        try {
          const { data, error } = await supabase.rpc('manual_checkin_search', {
            p_event_id: eventId,
            p_query: query
          });
          if (error) throw error;

          const tickets = data || [];
          if (tickets.error) throw new Error(tickets.error);

          if (tickets.length === 0) {
            resultsDiv.innerHTML = '<p style="color:var(--text-muted);font-size:.82rem;text-align:center;padding:16px">No attendees found matching "' + escapeHtml(query) + '"</p>';
            return;
          }

          resultsDiv.innerHTML = tickets.map(t => {
            const isScanned = !!t.scanned_at;
            const name = escapeHtml(t.display_name || 'Guest');
            const email = escapeHtml(t.display_email || '');
            const tier = escapeHtml(t.tier_name || '');
            const seat = t.seat_section ? `${escapeHtml(t.seat_section)} R${t.seat_row} S${t.seat_number}` : 'GA';
            const scanInfo = isScanned
              ? `<span style="color:#22c55e;font-size:.72rem">✓ Scanned (${t.scan_count || 1}x)</span>`
              : `<span style="color:#f59e0b;font-size:.72rem">○ Not scanned</span>`;

            const maxReached = t.max_scans && t.max_scans > 0 && (t.scan_count || 0) >= t.max_scans;

            return `
              <div class="checkin-result-card" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;margin-bottom:6px">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;font-size:.85rem">${name}</div>
                  <div style="font-size:.72rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${email}</div>
                  <div style="font-size:.72rem;color:var(--text-secondary);margin-top:2px">${tier} · ${seat} · ${scanInfo}</div>
                </div>
                ${maxReached
                  ? '<span style="font-size:.72rem;color:#ef4444;font-weight:600;flex-shrink:0">MAX</span>'
                  : `<button class="btn btn-primary btn-sm checkin-admit-btn" data-ticket="${t.ticket_id}" data-event="${eventId}" style="flex-shrink:0;font-size:.75rem;padding:6px 14px">${isScanned ? 'Re-entry' : '✓ Admit'}</button>`
                }
              </div>
            `;
          }).join('');

          // Attach admit handlers
          resultsDiv.querySelectorAll('.checkin-admit-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              btn.disabled = true;
              btn.textContent = '...';
              try {
                const { data: result, error } = await supabase.rpc('manual_checkin_admit', {
                  p_ticket_id: btn.dataset.ticket,
                  p_event_id: btn.dataset.event
                });
                if (error) throw error;
                if (result?.error) throw new Error(result.error);

                // Update UI
                btn.textContent = '✓ Done';
                btn.style.background = '#22c55e';
                playSound('success');
                if (navigator.vibrate) navigator.vibrate(100);

                // Add to scan history
                scanCount++;
                document.getElementById('scan-count').textContent = scanCount;
                addToHistory('valid', result.attendee_name + ' (Manual)', result.tier_name || 'Check-in');

                // Refresh search after 1.5s
                setTimeout(() => doSearch(), 1500);
              } catch (err) {
                btn.textContent = '✗ Error';
                btn.style.background = '#ef4444';
                playSound('error');
                setTimeout(() => { btn.textContent = 'Retry'; btn.disabled = false; btn.style.background = ''; }, 2000);
              }
            });
          });

        } catch (err) {
          resultsDiv.innerHTML = '<p style="color:#ef4444;font-size:.82rem;text-align:center;padding:12px">Error: ' + escapeHtml(err.message) + '</p>';
        }
      }

      searchBtn.addEventListener('click', doSearch);
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSearch();
      });
    }

    // Simple audio feedback — reuse a single AudioContext to avoid browser limits
    let _audioCtx = null;
    function getAudioCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    }

    function playSound(type) {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.value = 0.15;

        if (type === 'success') {
          osc.frequency.value = 880; osc.type = 'sine';
          osc.start(); osc.stop(ctx.currentTime + 0.15);
        } else if (type === 'error') {
          osc.frequency.value = 200; osc.type = 'square';
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else {
          osc.frequency.value = 440; osc.type = 'triangle';
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        }
      } catch(e) {}
    }

    // Cleanup camera on page leave to prevent background usage
    window.addEventListener('beforeunload', () => {
      if (scanner) scanner.stop().catch(() => {});
    });
  </script>

  <!-- Back button handler — separate from module to ensure it ALWAYS works -->
  <script>
    document.querySelector('.scanner-back').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    });
  </script>
