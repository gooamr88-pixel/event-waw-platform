<!DOCTYPE html>

  <script src="js/csp.js"></script>
</head>
<body>

        <span class="nav-logo-text shimmer">Event Waw</span>

      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="btn btn-outline btn-sm" id="nav-user-btn" style="display:none">
          <span id="nav-user-name">Account</span>
        </button>
        <a href="login.html" class="btn btn-outline btn-sm" id="nav-signin">Sign In</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      </div>
    </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu">
    <button class="close-btn" id="mobile-close">✕</button>
    <a href="events.html">Events</a>
    <a href="my-tickets.html">My Tickets</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="login.html" id="mobile-signin">Sign In</a>
    <button class="mobile-theme-toggle theme-toggle" aria-label="Toggle theme">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span class="theme-label-light">Light Mode</span>
      <span class="theme-label-dark">Dark Mode</span>
    </button>
  </div>

  <!-- ══════ PAGE CONTENT ══════ -->
  <div style="padding-top: 120px; min-height: 100vh;">
    <div class="container">
      <div class="section-header" data-reveal>
        <div class="section-header-flex">
          <div>
            <div class="section-label">Discover</div>
            <h1 style="font-family:var(--font-serif);font-size:clamp(1.9rem,4vw,2.75rem);font-weight:700;letter-spacing:-0.5px;line-height:1.2;">
              Upcoming <span class="gold" style="font-style:italic">Events</span>
            </h1>
            <p class="section-desc">Find and book your next unforgettable experience.</p>
          </div>
          <div class="filters" id="ev-filters">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="music">Music</button>
            <button class="filter-btn" data-category="gala">Gala</button>
            <button class="filter-btn" data-category="conference">Conference</button>
          </div>
        </div>
      </div>

      <!-- Search Bar -->
      <div style="margin-bottom:16px;" data-reveal>
        <div style="position:relative;max-width:480px;">
          <svg style="position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          <input type="text" class="fi" id="events-search" placeholder="Search events…" style="padding-left:44px;" />
        </div>
      </div>

      <!-- Inline Filters -->
      <div class="adv-filters-inline" id="adv-filters" style="margin-bottom:24px;">
        <div class="adv-pill-select">
          <select class="adv-select" id="ev-filter-city">
            <option value="all">All Cities</option>
          </select>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="adv-pill-select">
          <select class="adv-select" id="ev-filter-category">
            <option value="all">All Types</option>
            <option value="music">Music</option>
            <option value="sports">Sports</option>
            <option value="trips">Trips</option>
            <option value="conference">Conference</option>
            <option value="art">Art</option>
            <option value="food">Food</option>
            <option value="nightlife">Nightlife</option>
            <option value="workshop">Workshop</option>
            <option value="gala">Gala</option>
            <option value="general">General</option>
          </select>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <div class="adv-pill-select">
          <select class="adv-select" id="ev-filter-date">
            <option value="all">Any Date</option>
            <option value="today">Today</option>
            <option value="tomorrow">Tomorrow</option>
            <option value="week">This Week</option>
            <option value="month">This Month</option>
            <option value="custom">Pick a Date</option>
          </select>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <input type="date" class="adv-date-pill" id="ev-date-input" style="display:none;" />
        <button class="adv-reset-pill" id="ev-reset-btn" style="display:none;">Reset</button>
      </div>


      <!-- Events Grid -->
      <div class="events-grid" id="events-grid" data-stagger>
        <!-- Dynamic events loaded here -->
      </div>

      <!-- Loading State -->
      <div id="events-loading" style="text-align:center;padding:60px 0;">
        <div style="width:40px;height:40px;border:3px solid var(--border-color);border-top-color:var(--accent-primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
        <p style="color:var(--text-muted);font-size:0.9rem;">Loading events…</p>
      </div>

      <!-- Empty State -->
      <div id="events-empty" style="display:none;text-align:center;padding:80px 0;">
        <div style="font-size:3rem;margin-bottom:16px;">🎫</div>
        <h3 style="font-family:var(--font-serif);font-size:1.3rem;margin-bottom:8px;">No events found</h3>
        <p style="color:var(--text-muted);font-size:0.9rem;">Check back soon for new events, or try a different filter.</p>
      </div>
    </div>
  </div>

  <!-- ══════ FOOTER ══════ -->
  <footer class="footer" id="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <span>&copy; 2026 Event Waw. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script type="module">
    import { supabase, getCurrentUser } from './src/lib/supabase.js';
    import { semiProtectPage, updateNavForAuth, performSignOut } from './src/lib/guard.js';
    import { initUI } from './src/lib/ui.js';
    import { escapeHTML } from './src/lib/utils.js';

    let allEvents = [];
    let activeCategory = 'all';
    let activeCityFilter = 'all';
    let activeDateFilter = 'all';
    let customDate = null;
    let searchQuery = '';

    // ── Init ──
    document.addEventListener('DOMContentLoaded', async () => {
      initUI();

      const authState = await semiProtectPage();
      updateNavForAuth(authState);
      setupSignOut(authState);

      await loadEvents();
      initFilters();
      initSearch();
      initAdvancedFilters();
    });

    // ── Load Events ──
    async function loadEvents() {
      const loading = document.getElementById('events-loading');
      const grid = document.getElementById('events-grid');
      const empty = document.getElementById('events-empty');

      try {
        let { data, error } = await supabase
          .from('events')
          .select('*, ticket_tiers(id, name, price, capacity, sold_count)')
          .eq('status', 'published')
          .order('date', { ascending: true })
          .limit(50);

        if (error) throw error;

        loading.style.display = 'none';

        if (!data || data.length === 0) {
          empty.style.display = 'block';
          return;
        }

        allEvents = data;
        populateCityFilter(allEvents);
        applyAndRender();
      } catch (err) {
        console.error('Error loading events:', err);
        loading.style.display = 'none';
        empty.style.display = 'block';
      }
    }

    // ── Populate city dropdown dynamically ──
    function populateCityFilter(events) {
      const select = document.getElementById('ev-filter-city');
      if (!select) return;
      const cities = [...new Set(events.map(e => (e.city || '').trim()).filter(Boolean))].sort();
      select.innerHTML = '<option value="all">All Cities</option>';
      cities.forEach(city => {
        const opt = document.createElement('option');
        opt.value = city;
        opt.textContent = city;
        select.appendChild(opt);
      });
    }

    // ── Filter + Render Pipeline ──
    function applyAndRender() {
      let filtered = [...allEvents];
      const now = new Date();

      // Category
      if (activeCategory !== 'all') {
        filtered = filtered.filter(e => (e.category || '').toLowerCase() === activeCategory.toLowerCase());
      }

      // City
      if (activeCityFilter !== 'all') {
        filtered = filtered.filter(e => (e.city || '').toLowerCase() === activeCityFilter.toLowerCase());
      }

      // Date
      if (activeDateFilter !== 'all') {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        if (activeDateFilter === 'today') {
          const end = new Date(today); end.setDate(end.getDate() + 1);
          filtered = filtered.filter(e => { const d = new Date(e.date); return d >= today && d < end; });
        } else if (activeDateFilter === 'tomorrow') {
          const start = new Date(today); start.setDate(start.getDate() + 1);
          const end = new Date(start); end.setDate(end.getDate() + 1);
          filtered = filtered.filter(e => { const d = new Date(e.date); return d >= start && d < end; });
        } else if (activeDateFilter === 'week') {
          const end = new Date(today); end.setDate(end.getDate() + 7);
          filtered = filtered.filter(e => { const d = new Date(e.date); return d >= today && d <= end; });
        } else if (activeDateFilter === 'month') {
          const end = new Date(today); end.setMonth(end.getMonth() + 1);
          filtered = filtered.filter(e => { const d = new Date(e.date); return d >= today && d <= end; });
        } else if (activeDateFilter === 'custom' && customDate) {
          const start = new Date(customDate); start.setHours(0, 0, 0, 0);
          const end = new Date(start); end.setDate(end.getDate() + 1);
          filtered = filtered.filter(e => { const d = new Date(e.date); return d >= start && d < end; });
        }
      }

      // Search
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase().trim();
        filtered = filtered.filter(e =>
          (e.title || '').toLowerCase().includes(q) ||
          (e.venue || '').toLowerCase().includes(q) ||
          (e.city || '').toLowerCase().includes(q) ||
          (e.category || '').toLowerCase().includes(q)
        );
      }

      renderEvents(filtered);

      // Reset button visibility
      const resetBtn = document.getElementById('ev-reset-btn');
      if (resetBtn) {
        resetBtn.style.display = (activeCategory !== 'all' || activeCityFilter !== 'all' || activeDateFilter !== 'all' || searchQuery.trim()) ? '' : 'none';
      }
    }

    function renderEvents(events) {
      const grid = document.getElementById('events-grid');
      const empty = document.getElementById('events-empty');

      if (events.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = events.map(event => {
        const date = new Date(event.date);
        const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        const minPrice = event.ticket_tiers?.length 
          ? Math.min(...event.ticket_tiers.map(t => t.price))
          : 0;
        const totalAvail = event.ticket_tiers?.reduce((sum, t) => sum + (t.capacity - t.sold_count), 0) || 0;
        
        return `
          <article class="event-card" onclick="window.location.href='event-detail.html?id=${event.id}'">
            <div class="event-card-image">
              <img src="${escapeHTML(event.cover_image) || 'images/event-concert.png'}" alt="${escapeHTML(event.title)}" loading="lazy" />
              <div class="event-card-badge"><span class="dot"></span> ${escapeHTML(event.category || 'Event')}</div>
            </div>
            <div class="event-card-body">
              <div class="event-card-date">${dateStr} · ${timeStr}</div>
              <h3>${escapeHTML(event.title)}</h3>
              <div class="event-card-location">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                ${escapeHTML(event.venue)}${event.city ? ' · ' + escapeHTML(event.city) : ''}
              </div>
              <div class="event-card-footer">
                <div class="event-card-price">${minPrice > 0 ? '$' + minPrice.toLocaleString() + ' <small>/ person</small>' : 'Free'}</div>
                <div class="event-card-avail">${totalAvail > 0 ? '<strong>' + totalAvail + '</strong> spots left' : '<strong style="color:#ef4444;">Sold Out</strong>'}</div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    // ── Category Buttons (existing) ──
    function initFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeCategory = btn.dataset.category;
          // Sync dropdown
          const catSelect = document.getElementById('ev-filter-category');
          if (catSelect) catSelect.value = activeCategory;
          applyAndRender();
        });
      });
    }

    // ── Search ──
    function initSearch() {
      const input = document.getElementById('events-search');
      let debounce;
      input.addEventListener('input', () => {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
          searchQuery = input.value;
          applyAndRender();
        }, 250);
      });
    }

    // ── Advanced Filters ──
    function initAdvancedFilters() {
      const citySelect = document.getElementById('ev-filter-city');
      const catSelect = document.getElementById('ev-filter-category');
      const dateSelect = document.getElementById('ev-filter-date');
      const dateInput = document.getElementById('ev-date-input');
      const resetBtn = document.getElementById('ev-reset-btn');

      citySelect?.addEventListener('change', () => { activeCityFilter = citySelect.value; applyAndRender(); });

      catSelect?.addEventListener('change', () => {
        activeCategory = catSelect.value;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.category === activeCategory));
        applyAndRender();
      });

      dateSelect?.addEventListener('change', () => {
        activeDateFilter = dateSelect.value;
        if (dateInput) dateInput.style.display = activeDateFilter === 'custom' ? '' : 'none';
        if (activeDateFilter !== 'custom') { customDate = null; applyAndRender(); }
        else if (dateInput?.value) { customDate = dateInput.value; applyAndRender(); }
      });

      dateInput?.addEventListener('change', () => { customDate = dateInput.value; applyAndRender(); });

      resetBtn?.addEventListener('click', () => {
        activeCategory = 'all'; activeCityFilter = 'all'; activeDateFilter = 'all'; customDate = null; searchQuery = '';
        if (citySelect) citySelect.value = 'all';
        if (catSelect) catSelect.value = 'all';
        if (dateSelect) dateSelect.value = 'all';
        if (dateInput) { dateInput.value = ''; dateInput.style.display = 'none'; }
        const searchInput = document.getElementById('events-search');
        if (searchInput) searchInput.value = '';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.category === 'all'));
        applyAndRender();
      });
    }

    // ── Sign Out Setup ──
    function setupSignOut(authState) {
      if (!authState.user || !authState.isFullyAuth) return;

      const userBtn = document.getElementById('nav-user-btn');
      if (userBtn) {
        userBtn.addEventListener('click', () => performSignOut('/index.html'));
      }

      const mobileSignin = document.getElementById('mobile-signin');
      if (mobileSignin) {
        mobileSignin.textContent = 'Sign Out';
        mobileSignin.addEventListener('click', (e) => {
          e.preventDefault();
          performSignOut('/index.html');
        });
      }
    }

    // ── Shared utilities now imported from src/lib/ui.js ──
  </script>
</body>
</html>
