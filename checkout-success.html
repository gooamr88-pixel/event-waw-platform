<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — Event Waw</title>
  <meta name="description" content="Your ticket purchase was successful! View your QR code below." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <script src="js/csp.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg"><div class="auth-bg-ov" style="background:rgba(9,9,11,.95);"></div></div>
    <div class="particles"></div>

    <div class="auth-wrap" style="max-width:28rem;">
      <div class="auth-head">
        <a href="index.html" class="nav-logo" style="justify-content:center">
          <div class="nav-logo-icon"><svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="85" r="52" stroke="currentColor" stroke-width="10"/><path d="M68 75 L80 105 L100 80 L120 105 L132 75" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><line x1="62" y1="125" x2="38" y2="155" stroke="currentColor" stroke-width="10" stroke-linecap="round"/><circle cx="135" cy="52" r="5" fill="currentColor"/></svg></div>
          <span class="nav-logo-text shimmer">Event Waw</span>
        </a>
      </div>

      <div class="auth-box ani-up d2" style="text-align:center;">
        <!-- Success Icon -->
        <div class="auth-ok-ic" style="width:70px;height:70px;margin-bottom:20px;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
          </svg>
        </div>

        <h2 class="auth-box-title" style="font-size:1.4rem;">Payment Successful!</h2>
        <p class="auth-box-sub">Your tickets are confirmed. Show this QR code at the event entrance.</p>

        <!-- QR Code Display -->
        <div id="qr-container" style="background:#fff;padding:24px;border-radius:16px;display:inline-block;margin:16px 0 24px;">
          <div id="qr-code" style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;">
            <div class="spinner"></div>
          </div>
        </div>

        <!-- Order Details -->
        <div id="order-details" style="text-align:left;padding:16px;background:rgba(255,255,255,.03);border:1px solid var(--border-color);border-radius:12px;margin-bottom:20px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="color:var(--text-muted);font-size:0.85rem;">Event</span>
            <span id="order-event" style="font-weight:600;font-size:0.85rem;">Loading…</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="color:var(--text-muted);font-size:0.85rem;">Ticket</span>
            <span id="order-tier" style="font-weight:600;font-size:0.85rem;">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="color:var(--text-muted);font-size:0.85rem;">Amount Paid</span>
            <span id="order-amount" style="font-weight:600;font-size:0.85rem;color:var(--accent-primary);">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--text-muted);font-size:0.85rem;">Order ID</span>
            <span id="order-id" style="font-size:0.75rem;font-family:monospace;color:var(--text-muted);">—</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px;">
          <a href="my-tickets.html" class="btn btn-primary btn-full">View All My Tickets</a>
          <a href="events.html" class="btn btn-outline btn-full">Browse More Events</a>
        </div>
      </div>
    </div>
  </div>

  <style>
    .spinner {
      width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:var(--accent-primary);
      border-radius:50%;animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script type="module">
    import { supabase } from './src/lib/supabase.js';
    import { getOrderBySession } from './src/lib/tickets.js';
    import { protectPage } from './src/lib/guard.js';
    import { initUI, initParticles } from './src/lib/ui.js';
    import { escapeHTML } from './src/lib/utils.js';
    import QRCode from 'qrcode';

    document.addEventListener('DOMContentLoaded', async () => {
      initUI();
      initParticles();

      const auth = await protectPage();
      if (!auth) return; // Redirecting...

      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      if (sessionId) {
        await loadOrder(sessionId);
      } else {
        // Show placeholder
        generatePlaceholderQR();
      }
    });

    async function loadOrder(sessionId) {
      try {
        document.getElementById('order-event').textContent = 'Confirming payment…';
        const order = await getOrderBySession(sessionId);
        if (order && order.tickets?.length > 0) {
          const ticket = order.tickets[0];
          const event = ticket?.ticket_tiers?.events;
          const tierName = ticket?.ticket_tiers?.name || 'General';
          const eventTitle = event?.title || 'Event';
          const eventVenue = event?.venue || '';
          const eventDate = event?.date
            ? new Date(event.date).toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric',
                hour: 'numeric', minute: '2-digit'
              })
            : '';
          
          document.getElementById('order-event').textContent = eventTitle;
          document.getElementById('order-tier').textContent = tierName;
          document.getElementById('order-amount').textContent = `$${Number(order.amount).toLocaleString()}`;
          document.getElementById('order-id').textContent = order.id.substring(0, 12) + '…';

          // Generate premium QR card
          if (ticket?.qr_hash) {
            const container = document.getElementById('qr-container');
            container.style.background = 'transparent';
            container.style.padding = '0';
            container.innerHTML = `
              <div style="background:linear-gradient(145deg, #18181b 0%, #09090b 100%);border:1px solid rgba(212,175,55,.15);border-radius:20px;overflow:hidden;max-width:320px;margin:0 auto;">
                <!-- Gold Header -->
                <div style="background:linear-gradient(135deg,#D4AF37,#b8941f);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;">
                  <span style="font-size:0.65rem;font-weight:800;letter-spacing:0.15em;color:#09090b;text-transform:uppercase;">Event Waw Ticket</span>
                  <span style="font-size:0.6rem;font-weight:600;color:rgba(9,9,11,.5);">${ticket.id.substring(0, 8).toUpperCase()}</span>
                </div>
                
                <!-- Event Info -->
                <div style="padding:16px 16px 0;text-align:left;">
                  <div style="font-size:0.68rem;color:#D4AF37;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;">${escapeHTML(tierName)}</div>
                  <h3 style="font-family:var(--font-serif);font-size:1rem;font-weight:700;color:#f4f4f5;margin-bottom:8px;">${escapeHTML(eventTitle)}</h3>
                  <div style="display:flex;gap:16px;font-size:0.72rem;">
                    <span style="color:#a1a1aa;">📅 ${escapeHTML(eventDate)}</span>
                    <span style="color:#a1a1aa;">📍 ${escapeHTML(eventVenue)}</span>
                  </div>
                </div>
                
                <!-- Tear-off -->
                <div style="margin:12px 0;border-top:2px dashed rgba(255,255,255,.08);position:relative;">
                  <div style="position:absolute;left:-10px;top:-10px;width:20px;height:20px;border-radius:50%;background:rgba(9,9,11,.95);"></div>
                  <div style="position:absolute;right:-10px;top:-10px;width:20px;height:20px;border-radius:50%;background:rgba(9,9,11,.95);"></div>
                </div>
                
                <!-- QR -->
                <div style="text-align:center;padding:0 16px 16px;">
                  <div id="qr-code" style="display:inline-block;background:#fff;padding:14px;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.3);"></div>
                  <div style="margin-top:10px;">
                    <span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:50px;font-size:0.7rem;font-weight:600;background:rgba(34,197,94,.1);color:#22c55e;">✦ Valid</span>
                  </div>
                </div>
              </div>
            `;
            await generateQR(ticket.qr_hash);
          } else {
            generatePlaceholderQR();
          }
        } else {
          // Order not found after polling — show friendly message
          document.getElementById('order-event').textContent = 'Payment received!';
          document.getElementById('order-tier').textContent = 'Processing…';
          document.getElementById('order-amount').textContent = '—';
          document.getElementById('order-id').textContent = 'Check My Tickets page';
          const container = document.getElementById('qr-code');
          container.innerHTML = '<p style="color:#999;font-size:0.85rem;padding:30px 10px;">Your payment was successful! Your tickets will appear on the <strong>My Tickets</strong> page shortly.</p>';
        }
      } catch (err) {
        console.error('Error loading order:', err);
        generatePlaceholderQR();
      }
    }

    async function generateQR(data) {
      const container = document.getElementById('qr-code');
      container.innerHTML = '';
      const canvas = document.createElement('canvas');
      await QRCode.toCanvas(canvas, data, { width: 200, margin: 2, color: { dark: '#000000', light: '#ffffff' } });
      container.appendChild(canvas);
    }

    function generatePlaceholderQR() {
      const container = document.getElementById('qr-code');
      container.innerHTML = '<p style="color:#999;font-size:0.85rem;padding:40px 0;">QR code will appear after payment confirmation</p>';
      document.getElementById('order-event').textContent = 'Awaiting confirmation…';
    }
  </script>
</body>
</html>
