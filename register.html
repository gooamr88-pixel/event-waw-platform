<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Event Waw</title>
  <meta name="description" content="Join Event Waw to discover and book exclusive events." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/light-theme.css" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')</script>
  <script src="js/csp.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg"><img src="images/event-concert.png" alt="" /><div class="auth-bg-ov"></div></div>
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="particles"></div>

    <div class="auth-wrap wide" style="animation: scaleIn .6s cubic-bezier(.16,1,.3,1) forwards;">
      <!-- Logo -->
      <div class="auth-head">
        <a href="index.html" class="nav-logo" style="justify-content:center">
          <div class="nav-logo-icon" style="width:3rem;height:3rem;">
            <svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="85" r="52" stroke="currentColor" stroke-width="10"/><path d="M68 75 L80 105 L100 80 L120 105 L132 75" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><line x1="62" y1="125" x2="38" y2="155" stroke="currentColor" stroke-width="10" stroke-linecap="round"/><circle cx="135" cy="52" r="5" fill="currentColor"/></svg>
          </div>
          <span class="nav-logo-text shimmer" style="font-size:1.6rem;">Event Waw</span>
        </a>
        <p class="tagline" style="margin-top:10px;font-size:0.95rem;">Create your account to get started</p>
      </div>

      <div class="auth-box" style="animation: fadeInUp .7s cubic-bezier(.16,1,.3,1) .2s both;">
        <!-- Progress Steps -->
        <div class="reg-steps">
          <div class="reg-step active" id="prog-1"><span class="reg-step-num">1</span><span class="reg-step-label">Details</span></div>
          <div class="reg-step-line"></div>
          <div class="reg-step" id="prog-2"><span class="reg-step-num">2</span><span class="reg-step-label">Security</span></div>
          <div class="reg-step-line"></div>
          <div class="reg-step" id="prog-3"><span class="reg-step-num">3</span><span class="reg-step-label">Verify</span></div>
        </div>

        <div id="auth-msg" class="auth-msg" style="display:none;"></div>

        <!-- ══════ STEP 1: Personal Info ══════ -->
        <div id="step-1">
          <h2 class="auth-box-title" style="text-align:left;font-size:1.1rem;">Personal Information</h2>
          <p class="auth-box-sub" style="text-align:left;margin-bottom:20px;">Tell us a bit about yourself</p>

          <div class="f-row">
            <div class="fg">
              <label class="fl" for="reg-first">First name</label>
              <input type="text" class="fi" id="reg-first" placeholder="Fadi" autocomplete="given-name" required />
            </div>
            <div class="fg">
              <label class="fl" for="reg-last">Last name</label>
              <input type="text" class="fi" id="reg-last" placeholder="Auchi" autocomplete="family-name" required />
            </div>
          </div>
          <div class="fg">
            <label class="fl" for="reg-email">Email address</label>
            <input type="email" class="fi" id="reg-email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="fg">
            <label class="fl" for="reg-phone">Phone number <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
            <input type="tel" class="fi" id="reg-phone" placeholder="+20 1XX XXX XXXX" autocomplete="tel" />
          </div>

          <div class="fg">
            <label class="fl">I want to</label>
            <div class="role-grid">
              <label class="role-card selected" id="role-attendee">
                <input type="radio" name="role" value="attendee" checked style="display:none;" />
                <div class="role-card-icon">🎫</div>
                <div>
                  <div class="role-card-title">Attend Events</div>
                  <div class="role-card-desc">Browse and book tickets</div>
                </div>
              </label>
              <label class="role-card" id="role-organizer">
                <input type="radio" name="role" value="organizer" style="display:none;" />
                <div class="role-card-icon">🎪</div>
                <div>
                  <div class="role-card-title">Organize Events</div>
                  <div class="role-card-desc">Create and manage events</div>
                </div>
              </label>
            </div>
          </div>

          <button type="button" class="btn btn-primary btn-full btn-lg" id="next-step-2">
            Continue
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
          </button>

          <div class="divider"><span>or sign up with</span></div>
          <div class="soc-grid">
            <button type="button" class="soc-btn" id="google-signup" style="width:100%;">
              <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Continue with Google
            </button>
          </div>
        </div>

        <!-- ══════ STEP 2: Password ══════ -->
        <div id="step-2" style="display:none;">
          <h2 class="auth-box-title" style="text-align:left;font-size:1.1rem;">Secure your account</h2>
          <p class="auth-box-sub" style="text-align:left;margin-bottom:20px;">Create a strong password</p>

          <div class="fg">
            <label class="fl" for="reg-pass">Password</label>
            <div class="fi-wrap">
              <input type="password" class="fi" id="reg-pass" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8" />
              <button type="button" class="fi-toggle" aria-label="Toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
            <!-- Password Strength -->
            <div class="pass-strength" id="pass-strength">
              <div class="pass-bar"><div class="pass-bar-fill" id="pass-bar-fill"></div></div>
              <span class="pass-label" id="pass-label"></span>
            </div>
          </div>
          <div class="fg">
            <label class="fl" for="reg-conf">Confirm password</label>
            <div class="fi-wrap">
              <input type="password" class="fi" id="reg-conf" placeholder="Re-enter password" autocomplete="new-password" required minlength="8" />
              <button type="button" class="fi-toggle" aria-label="Toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
          </div>

          <label class="terms"><input type="checkbox" class="chk" id="terms-agree" required /><span>I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></span></label>

          <div style="display:flex;gap:12px;">
            <button type="button" class="btn btn-outline btn-lg" id="back-step-1" style="flex:0 0 auto;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
            </button>
            <button type="button" class="btn btn-primary btn-full btn-lg" id="reg-submit">
              <span id="reg-text">Create Account</span>
              <svg id="reg-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
              <div id="reg-spinner" class="btn-spinner" style="display:none;"></div>
            </button>
          </div>
        </div>

        <!-- ══════ STEP 3: OTP Verification ══════ -->
        <div id="step-3" style="display:none;">
          <div style="text-align:center;margin-bottom:24px;">
            <div class="otp-icon-wrap">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <h2 class="auth-box-title" style="margin-top:16px;">Verify your email</h2>
            <p class="auth-box-sub" style="margin-bottom:0;">We sent a 6-digit code to <strong id="otp-email-display"></strong></p>
          </div>

          <form id="otp-form">
            <div class="otp-inputs">
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-digit" data-index="0" />
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-digit" data-index="1" />
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-digit" data-index="2" />
              <div class="otp-dash">—</div>
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-digit" data-index="3" />
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-digit" data-index="4" />
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="otp-digit" data-index="5" />
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="otp-submit" disabled>
              <span id="otp-text">Verify & Continue</span>
              <svg id="otp-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
              <div id="otp-spinner" class="btn-spinner" style="display:none;"></div>
            </button>
          </form>

          <div style="text-align:center;margin-top:20px;">
            <p style="font-size:0.82rem;color:var(--text-muted);">Didn't receive the code? <button type="button" class="link-btn" id="resend-btn">Resend code</button></p>
            <p id="otp-timer" style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;"></p>
          </div>
        </div>
      </div>

      <p class="f-footer" style="animation: fadeInUp .7s cubic-bezier(.16,1,.3,1) .4s both;">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <style>
    .auth-msg { padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 16px; line-height: 1.5; }
    .auth-msg.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #fca5a5; }
    .auth-msg.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2); color: #86efac; }
    .btn-spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,.2); border-top-color: var(--bg-primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress Steps */
    .reg-steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 28px; }
    .reg-step { display: flex; align-items: center; gap: 8px; }
    .reg-step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; background: rgba(255,255,255,.05); border: 1.5px solid var(--border-color); color: var(--text-muted); transition: all 0.3s; }
    .reg-step.active .reg-step-num { background: var(--accent-primary); border-color: var(--accent-primary); color: #000; }
    .reg-step.done .reg-step-num { background: rgba(34,197,94,.15); border-color: #22c55e; color: #22c55e; }
    .reg-step-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; transition: color 0.3s; }
    .reg-step.active .reg-step-label { color: var(--text-primary); }
    .reg-step-line { width: 40px; height: 1.5px; background: var(--border-color); margin: 0 8px; transition: background 0.3s; }
    .reg-step-line.done { background: #22c55e; }

    /* Role Cards */
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .role-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(255,255,255,.03); border: 1.5px solid var(--border-color); border-radius: 14px; cursor: pointer; transition: all 0.25s; }
    .role-card:hover { border-color: rgba(212,175,55,.3); background: rgba(212,175,55,.03); }
    .role-card.selected { border-color: var(--accent-primary); background: rgba(212,175,55,.06); box-shadow: 0 0 20px rgba(212,175,55,.06); }
    .role-card-icon { font-size: 1.5rem; flex-shrink: 0; }
    .role-card-title { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); }
    .role-card-desc { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    @media (max-width: 440px) { .role-grid { grid-template-columns: 1fr; } }

    /* Password strength */
    .pass-strength { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .pass-bar { flex: 1; height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; }
    .pass-bar-fill { height: 100%; width: 0%; border-radius: 2px; transition: all 0.3s; }
    .pass-label { font-size: 0.7rem; font-weight: 600; min-width: 50px; }

    /* OTP */
    .otp-icon-wrap { width: 64px; height: 64px; margin: 0 auto; border-radius: 50%; background: rgba(212,175,55,.06); border: 1px solid rgba(212,175,55,.12); display: flex; align-items: center; justify-content: center; animation: goldPulse 3s ease-in-out infinite; }
    .otp-inputs { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .otp-digit { width: 48px; height: 56px; text-align: center; font-size: 1.4rem; font-weight: 700; font-family: var(--font-sans); color: var(--text-primary); background: rgba(255,255,255,.04); border: 1.5px solid var(--border-color); border-radius: 12px; transition: all 0.2s; caret-color: var(--accent-primary); }
    .otp-digit:focus { border-color: var(--accent-primary); background: rgba(212,175,55,.04); box-shadow: 0 0 0 3px rgba(212,175,55,.08); outline: none; }
    .otp-digit.filled { border-color: rgba(212,175,55,.3); background: rgba(212,175,55,.06); }
    .otp-digit.error { border-color: #ef4444; background: rgba(239,68,68,.04); animation: shake 0.4s ease; }
    .otp-dash { color: var(--text-muted); font-size: 1.2rem; font-weight: 300; padding: 0 2px; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    .link-btn { background: none; border: none; color: var(--accent-primary); font-weight: 600; cursor: pointer; transition: color .2s; font-size: inherit; font-family: inherit; }
    .link-btn:hover { color: var(--accent-light); }
    .link-btn:disabled { color: var(--text-muted); cursor: default; }
    @media (max-width: 400px) { .otp-digit { width: 40px; height: 48px; font-size: 1.2rem; } }
  </style>

  <script type="module">
    import { signUp } from './src/lib/auth.js';
    import { supabase } from './src/lib/supabase.js';
    import { guestOnlyPage, markOTPVerified } from './src/lib/guard.js';

    const SUPABASE_URL = 'https://bmtwdwoibvoewbesohpu.supabase.co';

    let registeredEmail = '';

    document.addEventListener('DOMContentLoaded', async () => {
      initTheme(); initToggles(); initParticles(); initOTPInputs(); initRoles(); initPasswordStrength();

      const isGuest = await guestOnlyPage({ redirectTo: '/events.html' });
      if (!isGuest) return;

      // ═══ Step 1 → Step 2 ═══
      document.getElementById('next-step-2').addEventListener('click', () => {
        const first = document.getElementById('reg-first').value.trim();
        const last = document.getElementById('reg-last').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const msg = document.getElementById('auth-msg');

        if (!first || !last) { showMsg('error', 'Please enter your full name.'); return; }
        if (!email || !email.includes('@')) { showMsg('error', 'Please enter a valid email.'); return; }
        msg.style.display = 'none';

        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
        setProgress(2);
      });

      // ═══ Step 2 → Back ═══
      document.getElementById('back-step-1').addEventListener('click', () => {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-1').style.display = 'block';
        setProgress(1);
      });

      // ═══ Step 2 → Create Account + OTP ═══
      document.getElementById('reg-submit').addEventListener('click', async () => {
        const firstName = document.getElementById('reg-first').value.trim();
        const lastName = document.getElementById('reg-last').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const password = document.getElementById('reg-pass').value;
        const confirm = document.getElementById('reg-conf').value;
        const agreed = document.getElementById('terms-agree').checked;
        const msg = document.getElementById('auth-msg');
        const btn = document.getElementById('reg-submit');

        if (password.length < 8) { showMsg('error', 'Password must be at least 8 characters.'); return; }
        if (password !== confirm) { showMsg('error', 'Passwords do not match.'); return; }
        if (!agreed) { showMsg('error', 'Please agree to the Terms of Service.'); return; }

        btn.disabled = true;
        document.getElementById('reg-text').textContent = 'Creating account…';
        document.getElementById('reg-arrow').style.display = 'none';
        document.getElementById('reg-spinner').style.display = 'block';
        msg.style.display = 'none';

        try {
          // 1. Get selected role
          const role = document.querySelector('input[name="role"]:checked')?.value || 'attendee';

          // 2. Sign up (may auto-login if email confirmation is OFF)
          const signUpData = await signUp({ email, password, firstName, lastName, phone, role });
          registeredEmail = email;

          // 3. Check if we already have a session from signUp
          let session = signUpData?.session;
          if (!session) {
            // Try to sign in (email confirmation may be ON — this may fail)
            try {
              const { data: signInData, error: signInErr } = await supabase.auth.signInWithPassword({ email, password });
              if (signInErr) throw signInErr;
              session = signInData?.session;
            } catch (signInError) {
              console.warn('Post-signup sign-in failed:', signInError.message);
              showMsg('error', 'Please disable "Confirm email" in Supabase Dashboard → Auth → Email provider. Then try again.');
              btn.disabled = false;
              document.getElementById('reg-text').textContent = 'Create Account';
              document.getElementById('reg-arrow').style.display = 'block';
              document.getElementById('reg-spinner').style.display = 'none';
              return;
            }
          }

          // 4. Ensure profile exists (backup for when DB trigger fails)
          const { getCurrentProfile } = await import('./src/lib/supabase.js');
          await getCurrentProfile(); // Self-healing: creates profile if missing

          // 5. Try to send OTP via Edge Function
          try {
            const otpResult = await sendOTPEmail(firstName, 'register');

            // Show OTP step
            document.getElementById('otp-email-display').textContent = otpResult.masked_email || (email.substring(0,2) + '***@' + email.split('@')[1]);
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';
            setProgress(3);
            setTimeout(() => document.querySelector('.otp-digit[data-index="0"]')?.focus(), 100);
            startResendTimer();
          } catch (otpErr) {
            // OTP failed — skip verification and go directly to events
            console.warn('OTP sending failed, skipping verification:', otpErr.message);
            await markOTPVerified(); // Mark as verified so guard doesn't block
            showMsg('success', '✓ Account created! Redirecting…');
            setTimeout(() => { window.location.href = '/events.html'; }, 1000);
          }

        } catch (err) {
          let errMsg = err.message || 'Registration failed.';
          if (errMsg.includes('already registered')) errMsg = 'This email is already registered. Try signing in.';
          if (errMsg.includes('Email not confirmed')) errMsg = 'Please disable "Confirm email" in Supabase Dashboard → Auth → Email settings.';
          console.error('Registration error:', err);
          showMsg('error', errMsg);
          btn.disabled = false;
          document.getElementById('reg-text').textContent = 'Create Account';
          document.getElementById('reg-arrow').style.display = 'block';
          document.getElementById('reg-spinner').style.display = 'none';
        }
      });

      // ═══ Step 3: Verify OTP ═══
      document.getElementById('otp-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = Array.from(document.querySelectorAll('.otp-digit')).map(d => d.value).join('');
        const btn = document.getElementById('otp-submit');
        if (code.length !== 6) return;

        btn.disabled = true;
        document.getElementById('otp-text').textContent = 'Verifying…';
        document.getElementById('otp-check').style.display = 'none';
        document.getElementById('otp-spinner').style.display = 'block';
        document.getElementById('auth-msg').style.display = 'none';

        try {
          const { data, error } = await supabase.rpc('verify_login_otp', { p_code: code });
          if (error) throw new Error(error.message);
          if (!data[0].is_verified) throw new Error(data[0].error_message);

          // ✅ Mark OTP verified in DB
          await markOTPVerified();

          showMsg('success', '✓ Email verified! Welcome to Event Waw!');
          setTimeout(() => { window.location.href = '/events.html'; }, 1000);
        } catch (err) {
          showMsg('error', err.message || 'Invalid code.');
          document.querySelectorAll('.otp-digit').forEach(d => { d.classList.add('error'); d.value = ''; setTimeout(() => d.classList.remove('error'), 500); });
          document.querySelector('.otp-digit[data-index="0"]')?.focus();
          btn.disabled = false;
          document.getElementById('otp-text').textContent = 'Verify & Continue';
          document.getElementById('otp-check').style.display = 'block';
          document.getElementById('otp-spinner').style.display = 'none';
        }
      });

      // ═══ Resend ═══
      document.getElementById('resend-btn').addEventListener('click', async () => {
        try {
          await sendOTPEmail(document.getElementById('reg-first').value.trim(), 'register');
          showMsg('success', '✓ New code sent!');
          startResendTimer();
          document.querySelectorAll('.otp-digit').forEach(d => d.value = '');
          document.querySelector('.otp-digit[data-index="0"]')?.focus();
          document.getElementById('otp-submit').disabled = true;
        } catch (e) { showMsg('error', e.message || 'Failed to resend.'); }
      });

      // Google OAuth
      document.getElementById('google-signup')?.addEventListener('click', async () => {
        try {
          const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: `${window.location.origin}/register.html`,
              queryParams: {
                access_type: 'offline',
                prompt: 'consent',
              },
            },
          });
          if (error) showMsg('error', error.message);
        } catch (e) { showMsg('error', 'Google sign-up failed. Please try again.'); }
      });
    });

    // ══════ Handle Google OAuth return (if user lands back on register page with session) ══════
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        // User returned from Google OAuth — ensure profile exists
        const user = session.user;
        const meta = user.user_metadata || {};

        const { data: existingProfile } = await supabase
          .from('profiles')
          .select('id')
          .eq('id', user.id)
          .maybeSingle();

        if (!existingProfile) {
          await supabase.from('profiles').insert({
            id: user.id,
            email: user.email,
            full_name: meta.full_name || meta.name || '',
            avatar_url: meta.avatar_url || null,
            role: 'attendee',
          });
        }

        // Mark OTP verified (Google users skip OTP)
        const { markOTPVerified } = await import('./src/lib/guard.js');
        await markOTPVerified();
        window.location.href = '/events.html';
      }
    })();

    // ══════ Send OTP via Edge Function (server-side generation + Brevo) ══════
    // The code is generated and sent entirely on the server — never exposed to the client
    async function sendOTPEmail(name, type) {
      const { data: { session } } = await supabase.auth.getSession();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/send-otp-email`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session?.access_token}`,
        },
        body: JSON.stringify({ name, type }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Failed to send verification email');
      }
      return await res.json();
    }

    // ══════ Helpers ══════
    function setProgress(step) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById(`prog-${i}`);
        el.classList.remove('active', 'done');
        if (i < step) el.classList.add('done');
        if (i === step) el.classList.add('active');
      }
      document.querySelectorAll('.reg-step-line').forEach((l, i) => { l.classList.toggle('done', i < step - 1); });
    }

    function showMsg(type, text) { const m = document.getElementById('auth-msg'); m.className = `auth-msg ${type}`; m.textContent = text; m.style.display = 'block'; }

    function initRoles() {
      document.querySelectorAll('.role-card').forEach(c => {
        c.addEventListener('click', () => {
          document.querySelectorAll('.role-card').forEach(x => x.classList.remove('selected'));
          c.classList.add('selected');
          c.querySelector('input').checked = true;
        });
      });
    }

    function initPasswordStrength() {
      document.getElementById('reg-pass').addEventListener('input', (e) => {
        const val = e.target.value;
        const fill = document.getElementById('pass-bar-fill');
        const label = document.getElementById('pass-label');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
          { w: '0%', c: '', t: '' },
          { w: '25%', c: '#ef4444', t: 'Weak' },
          { w: '50%', c: '#eab308', t: 'Fair' },
          { w: '75%', c: '#3b82f6', t: 'Good' },
          { w: '100%', c: '#22c55e', t: 'Strong' },
        ];
        const l = levels[score];
        fill.style.width = l.w;
        fill.style.background = l.c;
        label.textContent = l.t;
        label.style.color = l.c;
      });
    }

    let resendInterval = null;
    function startResendTimer() {
      const btn = document.getElementById('resend-btn'); const timer = document.getElementById('otp-timer');
      btn.disabled = true; let s = 60;
      timer.textContent = `Resend in ${s}s`;
      if (resendInterval) clearInterval(resendInterval);
      resendInterval = setInterval(() => { s--; timer.textContent = `Resend in ${s}s`; if (s <= 0) { clearInterval(resendInterval); timer.textContent = ''; btn.disabled = false; } }, 1000);
    }

    function initOTPInputs() {
      const d = document.querySelectorAll('.otp-digit');
      d.forEach((inp, i) => {
        inp.addEventListener('input', e => { const v = e.target.value.replace(/\D/g,''); e.target.value = v; if (v && i < 5) d[i+1].focus(); e.target.classList.toggle('filled',!!v); checkOTP(); });
        inp.addEventListener('keydown', e => { if (e.key==='Backspace'&&!inp.value&&i>0) { d[i-1].focus(); d[i-1].value=''; d[i-1].classList.remove('filled'); checkOTP(); } });
        inp.addEventListener('paste', e => { e.preventDefault(); const t=(e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,6); if(t.length===6){t.split('').forEach((c,j)=>{d[j].value=c;d[j].classList.add('filled');}); d[5].focus(); checkOTP();} });
      });
    }
    function checkOTP() { document.getElementById('otp-submit').disabled = Array.from(document.querySelectorAll('.otp-digit')).map(d=>d.value).join('').length !== 6; }

    function initTheme() { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light'); }
    function initToggles() {
      document.querySelectorAll('.fi-toggle').forEach(b => b.addEventListener('click', () => {
        const i = b.parentElement.querySelector('input'); if (!i) return;
        const s = i.type === 'password'; i.type = s ? 'text' : 'password';
        b.innerHTML = s ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>' : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }));
    }
    function initParticles() { document.querySelectorAll('.particles').forEach(c => { for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const s=Math.random()*2.5+1;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-5%;animation-duration:${Math.random()*16+10}s;animation-delay:${Math.random()*12}s;`;c.appendChild(p);}}); }
  </script>
</body>
</html>
